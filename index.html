<script id="v196-safe-storage-guard">
(function(){
  try {
    const k = "__storage_test__";
    window.localStorage.setItem(k, "1");
    window.localStorage.removeItem(k);
  } catch (e) {
    const store = {};
    Object.defineProperty(window, "localStorage", {
      configurable: true,
      value: {
        getItem: key => Object.prototype.hasOwnProperty.call(store, key) ? store[key] : null,
        setItem: (key, value) => { store[key] = String(value); },
        removeItem: key => { delete store[key]; },
        clear: () => { for (const key of Object.keys(store)) delete store[key]; },
        key: index => Object.keys(store)[index] || null,
        get length(){ return Object.keys(store).length; }
      }
    });
  }
})();
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>幻晶モンスターズ UI改修版</title>
  <style>
    :root {
      --bg1:#78d8ff;
      --bg2:#0c6da4;
      --sky:#92deff;
      --sea:#34bce4;
      --leaf:#54b45d;
      --leaf2:#3b8d45;
      --sand:#f4e4a8;
      --wood:#7a4d2a;
      --wood2:#5d381c;
      --gold:#f8d56a;
      --line:rgba(255,255,255,.22);
      --white:#fffef9;
      --shadow:0 10px 22px rgba(0,0,0,.24);
      --shadow-deep:0 18px 30px rgba(0,0,0,.33);
      --danger:#ff7a7a;
      --good:#94f1a6;
      --panel:#14324e;
      --panel2:#1b4567;
      --text-shadow:0 2px 0 rgba(0,0,0,.55), 0 0 8px rgba(0,0,0,.18);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--white);
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,.28), transparent 26%),
        linear-gradient(180deg, #79d5ff 0%, #48b8e5 34%, #2f94c0 70%, #146186 100%);
      overflow-x:hidden;
    }
    button,select{font:inherit;}
    .app-wrap{min-height:100%;display:flex;justify-content:center;align-items:flex-start;padding:10px;}
    .device{
      width:min(100%, 430px);
      min-height:calc(100vh - 20px);
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      border:4px solid rgba(255,255,255,.55);
      border-radius:34px;
      overflow:hidden;
      position:relative;
      box-shadow:0 24px 70px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
    }
    .device::before{
      content:"";
      position:absolute;left:0;right:0;top:0;height:84px;
      background:
        radial-gradient(circle at 20px 24px, var(--leaf) 0 10px, transparent 11px),
        radial-gradient(circle at 60px 18px, var(--leaf2) 0 14px, transparent 15px),
        radial-gradient(circle at 110px 22px, var(--leaf) 0 12px, transparent 13px),
        radial-gradient(circle at 180px 16px, var(--leaf2) 0 14px, transparent 15px),
        radial-gradient(circle at 250px 18px, var(--leaf) 0 12px, transparent 13px),
        radial-gradient(circle at 320px 22px, var(--leaf2) 0 14px, transparent 15px),
        radial-gradient(circle at 390px 16px, var(--leaf) 0 12px, transparent 13px);
      pointer-events:none;
      opacity:.95;
      z-index:0;
    }
    .device::after{
      content:"";
      position:absolute;left:0;right:0;bottom:0;height:72px;
      background:
        linear-gradient(180deg, transparent 0%, rgba(255,255,255,.0) 16%, rgba(255,255,255,.1) 16%, rgba(255,255,255,.1) 24%, transparent 24%),
        linear-gradient(180deg, rgba(255,243,214,.2), rgba(255,243,214,.06));
      pointer-events:none;
      z-index:0;
    }
    .view{display:none;position:relative;z-index:1;min-height:calc(100vh - 28px);padding:18px 16px 22px;}
    .view.active{display:block;animation:fade .2s ease-out;}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .sr{position:absolute;left:-9999px;}
    .text-outline{text-shadow:var(--text-shadow);}
    .mini-outline{ text-shadow: 0 1px 0 rgba(0,0,0,.55), 0 0 6px rgba(0,0,0,.15); }

    .small-btn,.icon-btn,.action-btn,.tab-btn,.wood-btn,.command-btn,.wide-btn{
      border:none;color:var(--white);cursor:pointer;
      text-shadow:var(--text-shadow);font-weight:800;letter-spacing:.02em;
    }
    .small-btn:disabled,.icon-btn:disabled,.action-btn:disabled,.command-btn:disabled,.wide-btn:disabled{opacity:.55;cursor:not-allowed}
    .small-btn,.wood-btn,.action-btn,.wide-btn{
      background:linear-gradient(180deg, #c88449 0%, #9d6030 100%);
      border:2px solid #5f3217;box-shadow: inset 0 2px 0 rgba(255,255,255,.25), 0 4px 0 rgba(79,40,20,.8), var(--shadow);
      border-radius:16px;
    }
    .small-btn{padding:10px 12px;font-size:12px;min-height:42px;}
    .wide-btn{padding:14px 18px;font-size:18px;min-height:54px; width:100%;}
    .wood-btn{padding:12px 14px;font-size:15px;min-height:48px;}
    .action-btn{
      padding:14px 12px;font-size:16px;min-height:54px;
      background:linear-gradient(180deg, #4fd8ff 0%, #1f8fd2 100%);
      border-color:#0d4f7a;box-shadow: inset 0 2px 0 rgba(255,255,255,.28), 0 4px 0 rgba(8,59,95,.82), var(--shadow);
    }
    .command-btn{
      min-height:60px;padding:10px;border-radius:18px;
      background:linear-gradient(180deg, #cbefff 0%, #76c5ff 100%);
      color:#fff;border:2px solid #2d7ab8;box-shadow: inset 0 2px 0 rgba(255,255,255,.5), 0 4px 0 rgba(27,83,125,.8), var(--shadow);
      font-size:18px;
    }
    .command-btn.alt{
      background:linear-gradient(180deg, #d8fff0 0%, #67d4bf 100%);
      border-color:#2d8a84;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.5), 0 4px 0 rgba(28,104,92,.8), var(--shadow);
    }
    .command-btn.warn{
      background:linear-gradient(180deg, #fff2c7 0%, #f8c667 100%);
      border-color:#bb7e28;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.45), 0 4px 0 rgba(138,93,28,.8), var(--shadow);
    }
    .command-btn.danger{
      background:linear-gradient(180deg, #ffd2d2 0%, #ff9f9f 100%);
      border-color:#c55b5b;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.45), 0 4px 0 rgba(125,53,53,.8), var(--shadow);
    }

    .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.26), rgba(255,255,255,.1));
      border:2px solid rgba(255,255,255,.45);
      border-radius:20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .wood-panel{
      background:linear-gradient(180deg, rgba(121,78,42,.97), rgba(79,46,22,.98));
      border:3px solid #e4be77;
      border-radius:22px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.18), var(--shadow-deep);
      position:relative;
      overflow:hidden;
    }
    .wood-panel::before{
      content:"";position:absolute;inset:0;
      background:repeating-linear-gradient(180deg, rgba(255,255,255,.03) 0 6px, rgba(0,0,0,.02) 6px 12px);
      pointer-events:none;
      opacity:.45;
    }
    .panel-inner{position:relative;z-index:1;padding:14px;}
    .top-pills{display:flex;gap:8px;flex-wrap:wrap;}
    .pill{
      padding:6px 10px;border-radius:999px;background:rgba(20,50,78,.72);border:2px solid rgba(255,255,255,.32);
      font-size:12px;font-weight:800;box-shadow:var(--shadow);
    }
    .panel-title{font-size:18px;font-weight:900;margin:0 0 8px;text-shadow:var(--text-shadow);}
    .muted{color:rgba(255,255,255,.88);opacity:.92}
    .tiny{font-size:12px;}

    /* title */
    .title-stage{min-height:calc(100vh - 28px);display:flex;flex-direction:column;justify-content:space-between;}
    .title-hero{
      margin-top:46px;
      min-height:420px;position:relative;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.34), transparent 18%),
        linear-gradient(180deg, rgba(156,231,255,.96) 0%, rgba(104,198,241,.95) 42%, rgba(68,191,217,.9) 63%, rgba(86,186,125,.85) 64%, rgba(40,126,69,.9) 84%, rgba(26,96,52,.92) 100%);
      border-radius:28px;
      border:4px solid rgba(255,255,255,.58);
      box-shadow:var(--shadow-deep);
      overflow:hidden;
    }
    .title-hero::before{
      content:"";position:absolute;left:-6%;right:-6%;bottom:24%;height:18%;
      background:radial-gradient(circle at 15% 40%, #5cae5d 0 48%, transparent 49%),
                 radial-gradient(circle at 33% 62%, #60b967 0 40%, transparent 41%),
                 radial-gradient(circle at 52% 42%, #76c169 0 46%, transparent 47%),
                 radial-gradient(circle at 68% 60%, #5aa65d 0 41%, transparent 42%),
                 radial-gradient(circle at 87% 44%, #6dc36d 0 44%, transparent 45%);
      opacity:.95;
    }
    .title-hero::after{
      content:"";position:absolute;left:0;right:0;bottom:0;height:32%;
      background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(13,65,83,.12) 22%, rgba(38,129,138,.5) 36%, rgba(58,168,204,.72) 100%);
    }
    .palm,.palm.right{position:absolute;top:36px;width:150px;height:220px;pointer-events:none;}
    .palm{left:-10px;}.palm.right{right:-8px;transform:scaleX(-1);}
    .palm .trunk{position:absolute;left:56px;top:56px;width:22px;height:150px;background:linear-gradient(180deg,#b07e4d,#7b4b26);border-radius:20px;transform:rotate(-8deg);box-shadow:var(--shadow)}
    .palm .leaf{position:absolute;top:0;left:18px;width:120px;height:22px;background:linear-gradient(90deg,#9cde58,#3e9d3f);border-radius:22px 6px 22px 6px;transform-origin:10px 10px;box-shadow:var(--shadow)}
    .palm .leaf:nth-child(1){transform:rotate(-38deg)}
    .palm .leaf:nth-child(2){transform:rotate(-12deg);top:18px;left:14px}
    .palm .leaf:nth-child(3){transform:rotate(12deg);top:34px;left:18px}
    .palm .leaf:nth-child(4){transform:rotate(36deg);top:48px;left:24px}
    .title-logo{position:absolute;left:18px;right:18px;top:84px;text-align:center;z-index:2;}
    .title-logo .logo-top{font-size:17px;font-weight:900;letter-spacing:.16em;color:#f8ffe3;text-shadow:var(--text-shadow)}
    .title-logo .logo-main{font-size:42px;line-height:1.02;margin-top:4px;font-weight:1000;color:#fff9d5;text-shadow:0 3px 0 #1d5179, 0 0 16px rgba(41,86,132,.35), 0 10px 25px rgba(0,0,0,.25)}
    .title-logo .logo-sub{font-size:16px;margin-top:10px;color:#fffef8;text-shadow:var(--text-shadow)}
    .mascot{
      position:absolute;left:22px;bottom:114px;width:108px;height:108px;border-radius:50%;
      background:radial-gradient(circle at 40% 30%, #fff7dc 0 24%, #ffd9a8 25% 43%, #f5aacd 44% 100%);
      border:4px solid rgba(255,255,255,.52);box-shadow:var(--shadow-deep);z-index:2;
    }
    .mascot::before,.mascot::after{content:"";position:absolute;background:#834070;border-radius:50%;}
    .mascot::before{width:16px;height:16px;left:28px;top:38px;box-shadow:34px 0 0 #834070;}
    .mascot::after{width:56px;height:28px;left:26px;top:56px;border-radius:0 0 30px 30px;background:#a55485;}
    .mascot .ear{position:absolute;top:18px;width:18px;height:26px;background:#c25ea3;border-radius:50% 50% 0 50%;}
    .mascot .ear.left{left:4px;transform:rotate(-28deg)}
    .mascot .ear.right{right:4px;transform:rotate(28deg) scaleX(-1)}
    .mascot .foot{position:absolute;bottom:-6px;width:24px;height:20px;background:#c764a8;border-radius:50%;}
    .mascot .foot.left{left:18px}.mascot .foot.right{right:18px}
    .island-shrine{position:absolute;right:26px;bottom:94px;width:128px;height:120px;z-index:2;}
    .island-shrine::before{content:"";position:absolute;left:20px;right:20px;bottom:0;height:16px;background:#3f9d54;border-radius:999px;}
    .island-shrine .tower{position:absolute;left:42px;bottom:14px;width:44px;height:76px;background:linear-gradient(180deg,#deecd5,#9fc78d);border:4px solid #d1b05e;border-bottom-width:6px;border-radius:10px 10px 6px 6px;}
    .island-shrine .roof{position:absolute;left:30px;bottom:82px;width:68px;height:22px;background:linear-gradient(180deg,#7ad3f1,#4ba9d7);clip-path:polygon(0 100%,50% 0,100% 100%);border-radius:12px;}
    .tap-panel{margin:14px 8px 0;text-align:center;}
    .tap-text{font-size:32px;font-weight:1000;margin:4px 0 14px;color:#d8fbff;text-shadow:0 3px 0 #1b6b8a, 0 0 16px rgba(0,0,0,.2)}
    .title-bottom{padding-bottom:20px;}
    .small-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}

    /* generic top bar */
    .frame-top{
      margin-top:28px;display:flex;justify-content:space-between;align-items:center;gap:8px;
    }
    .status-bubble{display:flex;gap:8px;align-items:center;}
    .clock-badge,.battery-badge,.slime-badge{
      padding:8px 12px;border-radius:18px;background:rgba(12,45,70,.82);border:2px solid rgba(255,255,255,.48);
      font-weight:900;font-size:12px;box-shadow:var(--shadow);text-shadow:var(--text-shadow)
    }
    .slime-badge{border-radius:18px 18px 18px 8px;}

    /* field */
    .field-layout{display:grid;gap:12px;padding-bottom:22px;}
    .field-scene{
      height:220px;border-radius:26px;position:relative;overflow:hidden;border:4px solid rgba(255,255,255,.55);box-shadow:var(--shadow-deep);
      background:
        radial-gradient(circle at 70% 18%, rgba(255,255,255,.28), transparent 20%),
        linear-gradient(180deg, #8adbff 0%, #75d2ff 34%, #47b4de 58%, #37c5d7 58%, #31a0c8 68%, #96d56c 69%, #68b657 82%, #5ca34c 100%);
    }
    .field-scene::before{content:"";position:absolute;left:-8%;right:-8%;bottom:76px;height:70px;background:radial-gradient(circle at 8% 40%, #f4ecbc 0 17%, transparent 18%), radial-gradient(circle at 34% 48%, #efe4af 0 22%, transparent 23%), radial-gradient(circle at 72% 56%, #efd79f 0 19%, transparent 20%), radial-gradient(circle at 92% 46%, #efdfb2 0 21%, transparent 22%);opacity:.95}
    .field-scene .water{position:absolute;right:-4%;bottom:28px;width:58%;height:110px;background:linear-gradient(180deg, rgba(157,243,255,.6), rgba(35,161,218,.92));border-radius:55% 0 0 0 / 75% 0 0 0;box-shadow:inset 0 8px 12px rgba(255,255,255,.24)}
    .field-scene .path{position:absolute;left:-6px;bottom:26px;width:58%;height:90px;background:linear-gradient(180deg,#f8efc1,#eddd9e);clip-path:polygon(0 100%,0 54%,18% 42%,28% 26%,40% 14%,57% 22%,72% 44%,84% 68%,100% 92%,100% 100%)}
    .field-scene .walker{position:absolute;left:142px;bottom:68px;width:28px;height:48px;background:linear-gradient(180deg,#3171d4 0 34%, #f4bd67 34% 68%, #5b7c2d 68% 100%);border-radius:16px 16px 10px 10px;box-shadow:var(--shadow)}
    .field-scene .walker::before{content:"";position:absolute;left:4px;top:-11px;width:20px;height:20px;background:#2f64cf;border-radius:50%;}
    .field-scene .sea-beast{position:absolute;right:24px;top:58px;width:110px;height:46px;background:linear-gradient(180deg,#77caef,#2b6891);clip-path:polygon(0 70%,20% 40%,44% 18%,72% 0,100% 38%,77% 46%,60% 74%,44% 86%,20% 96%,0 90%);opacity:.82}
    .field-scene .area-name{position:absolute;left:14px;top:14px;padding:10px 14px;border-radius:18px;background:rgba(17,67,88,.78);border:2px solid rgba(255,255,255,.44);font-weight:900;box-shadow:var(--shadow)}
    .field-main-grid{display:grid;grid-template-columns:64px 1fr 64px;gap:10px;align-items:start;}
    .side-stack{display:grid;gap:10px;}
    .icon-btn{
      min-height:64px;border-radius:20px;padding:8px 6px;
      background:linear-gradient(180deg,#d9f5ff,#73c6ff);border:2px solid #2c76ae;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.52), 0 4px 0 rgba(30,87,131,.78), var(--shadow);
      display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:11px;gap:4px;
    }
    .icon-btn .ico{font-size:20px;line-height:1;}
    .map-panel{padding:10px 12px;}
    .map-illustration{
      height:130px;border-radius:18px;position:relative;overflow:hidden;
      background:linear-gradient(180deg,#6fdaff 0%, #51c2ea 38%, #2a90bf 39%, #2f9ec8 100%);
      border:2px solid rgba(255,255,255,.35);
    }
    .map-illustration::before{content:"";position:absolute;inset:12px 34px 18px 34px;background:#67b15c;border-radius:44% 52% 46% 54% / 60% 42% 58% 40%;box-shadow:inset 0 0 0 4px rgba(0,0,0,.08)}
    .map-illustration::after{content:"";position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);width:100px;height:54px;border-radius:18px;background:rgba(77,163,219,.85);box-shadow:0 0 0 4px rgba(255,255,255,.18)}
    .map-path{position:absolute;left:26%;top:61%;width:48%;height:12px;background:#e5c282;border-radius:999px;transform:rotate(-12deg)}
    .map-node{position:absolute;width:24px;height:24px;border-radius:50%;background:#ff5c5c;border:4px solid #ffd77a;box-shadow:var(--shadow)}
    .map-node.one{left:24%;top:62%}.map-node.two{left:50%;top:46%}.map-node.three{right:24%;top:28%}
    .map-label{position:absolute;bottom:8px;left:10px;font-size:13px;font-weight:900;text-shadow:var(--text-shadow)}
    .map-caption{margin-top:8px;display:flex;justify-content:space-between;gap:8px;align-items:center;}
    .field-panel{min-height:246px;max-height:370px;overflow:auto;}
    .list{display:grid;gap:10px;}
    .monster-card,.dungeon-card,.info-card{
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08));
      border:2px solid rgba(255,255,255,.18);border-radius:18px;padding:12px;box-shadow:var(--shadow);
    }
    .monster-card.selected,.dungeon-card.selected{outline:3px solid #ffd96d;}
    .monster-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:8px;}
    .name{font-size:16px;font-weight:900;}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(14,52,79,.72);border:1px solid rgba(255,255,255,.3);font-size:11px;font-weight:800;margin:2px 4px 0 0;}
    .bar{height:10px;background:rgba(255,255,255,.16);border-radius:999px;overflow:hidden;margin:4px 0 8px;}
    .fill{height:100%;background:linear-gradient(90deg,var(--good),#4fd7e4);}
    .fill.mp{background:linear-gradient(90deg,#a3c3ff,#6e8fff);}.fill.low{background:linear-gradient(90deg,#ff8f8f,#f6b857)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11px;}
    .stats div{padding:5px 6px;border-radius:10px;background:rgba(0,0,0,.14)}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .chip-row{display:flex;gap:6px;flex-wrap:wrap;}
    .control-pad{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;}
    .control-wheel{
      grid-column:span 2;margin:0 auto;width:146px;height:146px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #a47f4f, #6f4725);
      border:5px solid #e0be72;box-shadow:inset 0 0 0 4px rgba(255,255,255,.08), var(--shadow-deep);
      position:relative;
    }
    .control-wheel::before{content:"";position:absolute;inset:23px;border-radius:50%;border:2px dashed rgba(255,235,178,.35)}
    .panel-tabs{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
    .tab-btn{
      padding:10px 12px;border-radius:999px;background:rgba(12,53,80,.78);border:2px solid rgba(255,255,255,.34);
      box-shadow:var(--shadow);font-size:12px;
    }
    .tab-btn.active{background:linear-gradient(180deg,#52d8ff,#1783cc);}
    .empty{padding:20px;border:2px dashed rgba(255,255,255,.28);border-radius:18px;text-align:center;background:rgba(255,255,255,.06)}
    .field-bottom-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

    /* battle */
    .battle-layout{display:grid;gap:12px;padding-bottom:18px;}
    .battle-top{margin-top:28px;display:flex;gap:8px;align-items:center;justify-content:space-between;}
    .battle-counter{padding:10px 14px;border-radius:18px;background:rgba(5,30,52,.84);border:2px solid rgba(255,255,255,.38);font-size:18px;font-weight:1000;box-shadow:var(--shadow)}
    .battle-switches{display:flex;gap:8px;}
    .mini-switch{padding:10px 12px;border-radius:16px;background:linear-gradient(180deg,#ec9a65,#cf6534);border:2px solid #8f3f19;box-shadow:var(--shadow);font-size:13px;font-weight:900}
    .arena{height:250px;border-radius:26px;overflow:hidden;position:relative;background:linear-gradient(180deg,#8ad9ff 0%, #7bcfff 34%, #efdb99 35%, #f2d58a 100%);border:4px solid rgba(255,255,255,.55);box-shadow:var(--shadow-deep);}
    .arena::after{content:"";position:absolute;left:0;right:0;bottom:0;height:46px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.12));}
    .enemy-sprite-row{position:absolute;left:12px;right:12px;top:42px;display:flex;justify-content:space-between;align-items:flex-end;gap:10px;}
    .enemy-slot{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
    .sprite{

    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);
      parsed.playerName ??= "ルカ";
      parsed.tutorialSeen ??= false;
      parsed.gold ??= 120;
      parsed.items ??= { "スカウトビスケット": 3, "癒しの葉": 2, "融合石": 1 };
      parsed.owned ??= [];
      parsed.partyIds ??= parsed.owned.slice(0,3).map(m=>m.uid);
      parsed.standbyIds ??= [];
      parsed.codex ??= [];
      parsed.progress ??= { cleared: [] };
      parsed.settings ??= { consumeParents: true };
      parsed.fusionHistory ??= [];
      parsed.battle ??= null;
      parsed.selectedDungeonId ??= "meadow";
      const ownedIds = new Set(parsed.owned.map(m => m.uid));
      parsed.partyIds = unique(parsed.partyIds).filter(id => ownedIds.has(id)).slice(0, 3);
      parsed.standbyIds = unique(parsed.standbyIds).filter(id => ownedIds.has(id) && !parsed.partyIds.includes(id)).slice(0, 3);
      for (const m of parsed.owned) {
        const mx = maxStats(m);
        m.currentHp ??= mx.hp; m.currentMp ??= mx.mp; m.skills ??= species[m.speciesId]?.skills || []; m.aiPolicy ??= "バランス重視";
      }
      return parsed;
    } catch(e) {
      console.warn(e); return defaultState();
    }
  }
  function replaceState(next){
    for (const key of Object.keys(state)) delete state[key];
    Object.assign(state, next);
    window.state = state;
  }
  function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function maxStats(mon){ return statAt(mon.speciesId, mon.level, mon.bonus || {}); }
  function getOwned(id){ return state.owned.find(m=>m.uid===id); }
  function party(){ return state.partyIds.map(getOwned).filter(Boolean); }
  function standby(){ return (state.standbyIds || []).map(getOwned).filter(Boolean); }
  function ranchMonsters(){ const used = new Set([...(state.partyIds || []), ...(state.standbyIds || [])]); return state.owned.filter(m => !used.has(m.uid)); }
  function aliveParty(){ return party().filter(m=>m.currentHp>0); }
  function totalPower(mon){ const st=maxStats(mon); return st.hp + st.mp*.7 + st.atk*2 + st.def*1.5 + st.spd*1.3 + st.wis*1.5 + mon.level*8; }
  function speciesCss(mon){ const cat = species[mon.speciesId].category; if (cat.includes("獣")) return "beast"; if (cat.includes("植物")) return "plant"; if (cat.includes("甲殻")) return "shell"; if (cat.includes("精霊")) return "spirit"; if (cat.includes("鳥")) return "bird"; if (cat.includes("竜")) return "dragon"; return ""; }

  function fieldMonsterCard(mon, position){
    const sp = species[mon.speciesId]; const max = maxStats(mon);
    const hpRate = Math.max(0, Math.min(100, Math.round(mon.currentHp / max.hp * 100)));

        <div class="stats"><div>攻 ${max.atk}</div><div>防 ${max.def}</div><div>速 ${max.spd}</div><div>賢 ${max.wis}</div><div>MP ${mon.currentMp}</div><div>Exp ${mon.exp}</div></div>

        </div>
      </div>`;
  }

  function ranchMonsterCard(mon){
    const sp = species[mon.speciesId]; const max = maxStats(mon);
    const hpRate = Math.max(0, Math.min(100, Math.round(mon.currentHp / max.hp * 100)));

  function previewFusion(a,b){
    const sa = species[a.speciesId]; const sb = species[b.speciesId];
    const directKeys = [`${sa.category}+${sb.category}`, `${sa.element}+${sb.category}`, `${sb.element}+${sa.category}`, `${sa.category}+${sb.element}`];
    let childSpecies = null;
    for (const key of directKeys) { if (categoryFusion[key]) { childSpecies = categoryFusion[key]; break; } }
    if (!childSpecies) childSpecies = chooseFallbackSpecies(a,b);
    const childSp = species[childSpecies];
    const childLevel = Math.max(1, Math.floor((a.level + b.level) / 2) - 2);
    const aStats=maxStats(a), bStats=maxStats(b); const bonus={};
    for (const k of Object.keys(aStats)) bonus[k] = Math.floor(((aStats[k]+bStats[k])/2)*0.12);
    const inherited = unique([...a.skills, ...b.skills, ...childSp.skills]).slice(0,4);
    const child = createMonster(childSpecies, childLevel, { bonus, extraSkills: inherited, parents:[a.speciesId,b.speciesId] });
    child.skills = inherited; child.nickname = childSp.name;
    return { child, childSp, bonus, inherited };
  }
  function chooseFallbackSpecies(a,b){
    const sa = species[a.speciesId], sb = species[b.speciesId];
    const avgRank = Math.round((rankValue[sa.rank] + rankValue[sb.rank]) / 2);
    const candidates = Object.values(species).filter(sp => rankValue[sp.rank] <= avgRank + 1).sort((x,y)=>{
      const scoreX = (x.element===sa.element || x.element===sb.element ? -2 : 0) + Math.abs(rankValue[x.rank]-avgRank);
      const scoreY = (y.element===sa.element || y.element===sb.element ? -2 : 0) + Math.abs(rankValue[y.rank]-avgRank);
      return scoreX - scoreY;
    });
    return candidates[0]?.id || 'plumo';
  }

  function generateEncounter(dungeon, floor, boss=false){ const count=boss?1:Math.min(3,1+Math.floor(Math.random()*Math.min(3,floor+1))); const ids=boss?[dungeon.boss]:Array.from({length:count},()=>randomPick(dungeon.enemies)); return ids.map(id=>{ const lv=Math.max(1,dungeon.recommended+floor-1+Math.floor(Math.random()*2)); const m=createMonster(id,lv); m.enemyId=uid(); return m; }); }

    if (!ally || !sk || sk.mp > ally.currentMp) return;

    if (sk.type === 'heal') ui.battleMenu = 'orderAllyTarget';
    else if (sk.type === 'buff') { executeSelectedSkill(ally, ally); postPlayerAction(); return; }
    else ui.battleMenu = 'orderTarget';
    renderBattle();
  }
  function selectOrderTarget(index){
    const ally = getOwned(ui.selectedAllyId); const target = state.battle.enemies[index];
    if (!ally || !target || target.currentHp <= 0) return;
    executeSelectedSkill(ally, target); postPlayerAction();
  }
  function selectOrderAllyTarget(uid){
    const ally = getOwned(ui.selectedAllyId); const target = getOwned(uid);
    if (!ally || !target) return;
    executeSelectedSkill(ally, target); postPlayerAction();
  }
  function executeSelectedSkill(ally, target){
    const sk = skills[ui.selectedSkillId];
    if (!sk) return;
    ally.currentMp -= sk.mp;
    if(sk.type==='heal'){
      const amount=Math.max(12,Math.floor(maxStats(ally).wis*Math.abs(sk.power))); const max=maxStats(target);
      target.currentHp=Math.min(max.hp,target.currentHp+amount); addLog(`${ally.nickname}は${sk.name}を使い、${target.nickname}を${amount}回復した！`);
    } else if(sk.type==='buff'){
      ally.tempDef=(ally.tempDef||0)+5; addLog(`${ally.nickname}は${sk.name}で身を固めた！`);
    } else {
      dealDamage(ally,target,sk.power,sk.name,sk);
    }
    ui.battleMenu='main'; ui.selectedAllyId=null; ui.selectedSkillId=null;
  }

  function selectTacticAlly(uid){ ui.selectedAllyId = uid; ui.battleMenu = 'tacticSelect'; renderBattle(); }
  function setTacticPolicy(policy){ const ally=getOwned(ui.selectedAllyId); if(!ally) return; ally.aiPolicy = policy; saveState(); addLog(`${ally.nickname}の作戦を「${policy}」にした。`); backBattleMenu(); }

  function selectBattleItem(name){
    const meta = itemCatalog[name]; if (!meta || !meta.usableInBattle || (state.items[name]||0)<=0) return;
    ui.selectedItemName = name;
    if (meta.effect === 'heal') { ui.battleMenu = 'itemTarget'; renderBattle(); return; }
    if (meta.effect === 'scoutBoost') { state.items[name]--; state.battle.scoutBoost = (state.battle.scoutBoost || 0) + meta.value; addLog(`${name}を使った。次のスカウト成功率が上がった！`); saveState(); backBattleMenu(); return; }
  }
  function selectItemTarget(uid){
    const meta = itemCatalog[ui.selectedItemName]; const target = getOwned(uid);
    if (!meta || !target || (state.items[ui.selectedItemName]||0)<=0) return;
    if (meta.effect === 'heal') {
      const max=maxStats(target); target.currentHp=Math.min(max.hp, target.currentHp + meta.value); state.items[ui.selectedItemName]--;
      addLog(`${target.nickname}は${ui.selectedItemName}で${meta.value}回復した！`);
      ui.battleMenu='main'; ui.selectedItemName=null; postPlayerAction();
    }
  }

  function calculateScoutRate(enemy){
    const sp=species[enemy.speciesId], max=maxStats(enemy);
    const hpFactor=Math.round((1-enemy.currentHp/max.hp)*35);
    const rankPenalty=rankValue[sp.rank]*5;
    const partyPower = aliveParty().reduce((sum,m)=>{ const st=maxStats(m); return sum + st.atk + st.wis; },0) / Math.max(1, aliveParty().length);
    const powerBonus = Math.min(18, Math.floor(partyPower / 5));
    const itemBonus = state.battle?.scoutBoost || 0;
    return Math.max(5, Math.min(95, sp.scoutRate + hpFactor + powerBonus + itemBonus - rankPenalty));
  }
  function selectScoutTarget(index){
    const enemy=state.battle.enemies[index]; if(!enemy || enemy.currentHp<=0) return;
    const rate = calculateScoutRate(enemy); const roll=Math.random()*100;
    addLog(`${enemy.nickname}へスカウトアタック！ 成功率${rate}%`);
    state.battle.scoutBoost = 0;
    if(roll < rate){
      const candidate = createMonster(enemy.speciesId, Math.max(1, enemy.level-1));
      candidate.nickname = species[enemy.speciesId].name;
      state.battle.pendingScout = { enemyIndex:index, candidate };
      enemy.currentHp = 0;
      addLog(`${enemy.nickname}のスカウトに成功！ 名前を決めよう。`);
      ui.battleMenu = 'scoutName'; saveState(); renderBattle();
    } else {
      addLog(`${enemy.nickname}のスカウトに失敗した……`);
      ui.battleMenu='main'; postPlayerAction();
    }
  }
  function finalizeScout(toParty){
    const pending = state.battle?.pendingScout; if(!pending) return;
    const input = document.getElementById('scoutNameInput');
    const name = (input?.value || pending.candidate.nickname).trim().slice(0,8) || pending.candidate.nickname;
    pending.candidate.nickname = name;
    state.owned.push(pending.candidate);
    state.codex = unique([...state.codex, pending.candidate.speciesId]);
    if (toParty && state.partyIds.length < 3) state.partyIds.push(pending.candidate.uid);
    else if (toParty && state.partyIds.length >= 3) showToast('パーティが満員なので牧場に送りました');
    state.battle.pendingScout = null;
    ui.battleMenu = 'main';
    saveState();
    postPlayerAction();
  }
  function swapFromStandby(uid){
    if (!state.standbyIds.includes(uid) || state.partyIds.length === 0) return;
    const out = state.partyIds[0];
    state.partyIds[0] = uid;
    state.standbyIds = state.standbyIds.filter(x => x !== uid);
    if (out) state.standbyIds.unshift(out);
    state.standbyIds = state.standbyIds.slice(0,3);
    addLog('メインとスタンバイを入れかえた。');
    saveState(); backBattleMenu();
  }

  function enemyTurn(){ const enemies=state.battle.enemies.filter(e=>e.currentHp>0); for(const enemy of enemies){ const targets=aliveParty(); if(!targets.length) break; const target=randomPick(targets); const sk=skills[randomPick(enemy.skills)] || null; if(sk && sk.mp<=enemy.currentMp && sk.type!=='heal' && sk.type!=='buff'){ enemy.currentMp -= sk.mp; dealDamage(enemy,target,sk.power*.88,sk.name,sk); } else { dealDamage(enemy,target,.82,'攻撃'); } } }
  function checkBattleEnd(){ const b=state.battle; if(!aliveParty().length){ addLog('味方が全滅した……'); b.status='lose'; return true; } if(!b.enemies.some(e=>e.currentHp>0)){ const exp=b.enemies.reduce((sum,e)=>sum+12+e.level*5+rankValue[species[e.speciesId].rank]*4,0); const gold=b.enemies.reduce((sum,e)=>sum+8+e.level*3,0); b.reward.exp += exp; b.reward.gold += gold; addLog(`勝利！ 経験値${exp} / ${gold}Gを獲得予定。`); gainExp(exp); if(b.floor >= b.maxFloor){ b.status='dungeonClear'; addLog(`${dungeons.find(d=>d.id===b.dungeonId).name}を踏破した！`); } else { b.status='floorClear'; } return true; } return false; }
  function postPlayerAction(){ if (state.battle?.pendingScout) { saveState(); renderBattle(); return; } if (checkBattleEnd()) { saveState(); renderBattle(); return; } enemyTurn(); ui.battleTurn += 1; ui.battleMenu='main'; checkBattleEnd(); saveState(); renderBattle(); if (ui.autoBattle && state.battle?.status==='battle') setTimeout(()=>playerAttack(), 380); }
  function gainExp(exp){ for (const m of aliveParty()) { m.exp += exp; while (m.exp >= expToNext(m.level)) { m.exp -= expToNext(m.level); levelUp(m); } } }
  function expToNext(level){ return 30 + level * 18; }
  function levelUp(mon){ mon.level += 1; const newMax=maxStats(mon); mon.currentHp=newMax.hp; mon.currentMp=newMax.mp; addLog(`${mon.nickname}はLv.${mon.level}になった！`); }
  function toggleAutoBattle(){ ui.autoBattle = !ui.autoBattle; renderBattle(); showToast(`オート ${ui.autoBattle ? 'ON' : 'OFF'}`); if (ui.autoBattle && state.battle?.status==='battle') setTimeout(()=>playerAttack(), 380); }
  function toggleBattleSpeed(){ ui.battleSpeed = ui.battleSpeed === '通常速度' ? '高速' : '通常速度'; renderBattle(); }
  function escapeBattle(){ const ok=Math.random()<0.72; if(ok){ addLog('うまく逃げ切った！'); state.battle=null; saveState(); showToast('拠点に戻りました'); switchView('field'); } else { addLog('逃げられなかった！'); enemyTurn(); ui.battleTurn += 1; checkBattleEnd(); saveState(); renderBattle(); } }
  function nextFloor(){ const b=state.battle; const dungeon=dungeons.find(d=>d.id===b.dungeonId); b.floor += 1; b.status='battle'; const eventRoll=Math.random(); if(eventRoll<.18){ const gold=20 + b.floor*15; b.reward.gold += gold; addLog(`宝箱を発見！ ${gold}Gを入手予定。`); } else if(eventRoll<.30){ for(const m of party()){ if(m.currentHp>0){ const max=maxStats(m); m.currentHp=Math.min(max.hp, m.currentHp+25); m.currentMp=Math.min(max.mp, m.currentMp+8); } } addLog('澄んだ泉で少し回復した。'); } else { addLog('通路を慎重に進んだ。'); } const boss=b.floor >= b.maxFloor; b.enemies = generateEncounter(dungeon,b.floor,boss); b.pendingScout=null; b.scoutBoost=0; ui.battleMenu='main'; addLog(boss ? 'ボスの気配がする！' : `第${b.floor}層で敵と遭遇！`); saveState(); renderBattle(); }
  function finishDungeon(){ const b=state.battle; const dungeon=dungeons.find(d=>d.id===b.dungeonId); state.gold += b.reward.gold + dungeon.reward.gold; state.items[dungeon.reward.item]=(state.items[dungeon.reward.item]||0)+1; state.progress.cleared = unique([...state.progress.cleared, dungeon.id]); state.codex = unique([...state.codex, ...dungeon.enemies, dungeon.boss]); state.battle = null; saveState(); showToast(`${dungeon.name}クリア！ 報酬を獲得しました`); switchView('field'); setFieldPanel('overview'); }
  function finishLose(){ for(const m of party()){ const max=maxStats(m); m.currentHp=Math.max(1, Math.floor(max.hp*.35)); m.currentMp=Math.max(0, Math.floor(max.mp*.25)); } state.gold = Math.max(0, state.gold - 20); state.battle = null; saveState(); switchView('field'); showToast('拠点に戻りました'); }

  function renderEvent(){
    const el = document.getElementById('eventView');
    const scene = ui.currentEvent ? eventScenes[ui.currentEvent] : null;
    const row = scene ? scene[ui.eventIndex] : null;
    el.innerHTML = `
      <div class="event-layout">
        ${topBar('イベント')}
        <div class="event-scene">
          <div class="event-arch"></div>
          <div class="player-sprite"></div>
          <div class="companion-sprite"></div>
          <div class="npc"></div>
          <div class="mentor-sprite"></div>
          <div class="monster-friend"></div>
        </div>
        <div class="wood-panel dialogue-panel"><div class="panel-inner">
          <div>
            <div class="speaker">${row ? escapeHtml(row.speaker) : '案内'}</div>
            <div class="dialogue-text">${row ? escapeHtml(row.text) : 'イベントはありません。'}</div>
          </div>
          <div class="event-controls">
            <button class="small-btn" onclick="skipEvent()">スキップ</button>
            <button class="wide-btn" style="width:auto;min-width:150px;" onclick="nextEventLine()">次へ ▶</button>
          </div>
        </div></div>
      </div>`;
  }
  function showEvent(sceneId){ ui.currentEvent = sceneId; ui.eventIndex = 0; switchView('event'); }
  function nextEventLine(){ const scene = eventScenes[ui.currentEvent]; if (!scene) return switchView('field'); ui.eventIndex += 1; if (ui.eventIndex >= scene.length) { ui.currentEvent=null; ui.eventIndex=0; switchView('field'); return; } renderEvent(); }
  function skipEvent(){ ui.currentEvent=null; ui.eventIndex=0; switchView('field'); }
  function startAdventure(){ if (!localStorage.getItem(STORAGE_KEY)) { replaceState(defaultState()); saveState(); } showEvent('intro'); }
  function quickContinue(){ switchView('field'); }
  function openSaveLoadFromTitle(){ switchView('field'); setFieldPanel('settings'); showToast('セーブ/ロードは設定メニューから操作できます'); }
  function openSettingsFromTitle(){ switchView('field'); setFieldPanel('settings'); }
  function showLicense(){ alert('Original UI prototype\nAll art and interface styling in this prototype are newly composed for this demo.'); }

  window.switchView = switchView;
  window.startAdventure = startAdventure;
  window.quickContinue = quickContinue;
  window.openSaveLoadFromTitle = openSaveLoadFromTitle;

<script id="v14-battle-effects-script">
(function () {
  "use strict";

  const V14 = {
    version: "1.4.0",
    busy: false,
    auto: false,
    autoTimer: null,
    lastResult: null,
    lastExpSnapshot: [],
    enemyVisualIndex: new Map(),
    pendingAfterResult: null
  };

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function getSpeedMs() {
    const speed = (window.ui && window.ui.battleSpeed === "高速") ? 260 : 560;
    return speed;
  }

  function ensureAutoUi() {
    if (!document.getElementById("v14AutoBanner")) {
      const banner = document.createElement("div");
      banner.id = "v14AutoBanner";
      banner.className = "v14-auto-banner";
      banner.textContent = "おまかせ戦闘中・・・";
      document.body.appendChild(banner);
    }
    if (!document.getElementById("v14AutoCancel")) {
      const btn = document.createElement("button");
      btn.id = "v14AutoCancel";
      btn.className = "v14-auto-cancel";
      btn.textContent = "解除";
      btn.onclick = function () {
        setAutoBattle(false);
      };
      document.body.appendChild(btn);
    }
    updateAutoUi();
  }

  function updateAutoUi() {
    ensureAutoUi.silent = true;
    const banner = document.getElementById("v14AutoBanner");
    const cancel = document.getElementById("v14AutoCancel");
    if (banner) banner.classList.toggle("show", Boolean(V14.auto && window.state?.battle?.status === "battle"));
    if (cancel) cancel.classList.toggle("show", Boolean(V14.auto && window.state?.battle?.status === "battle"));
  }

  function setBusy(value) {
    V14.busy = Boolean(value);
    const view = document.getElementById("battleView");
    if (view) view.classList.toggle("v14-command-lock", V14.busy);
  }

  function setAutoBattle(value) {
    V14.auto = Boolean(value);
    if (window.ui) window.ui.autoBattle = V14.auto;
    if (!V14.auto && V14.autoTimer) {
      clearTimeout(V14.autoTimer);
      V14.autoTimer = null;
    }
    updateAutoUi();
    safeRenderBattle();
    if (V14.auto) scheduleAuto();
  }

  function scheduleAuto() {
    if (!V14.auto || V14.busy || !window.state?.battle || window.state.battle.status !== "battle") return;
    if (V14.autoTimer) clearTimeout(V14.autoTimer);
    V14.autoTimer = setTimeout(async () => {
      V14.autoTimer = null;
      if (!V14.auto || V14.busy || !window.state?.battle || window.state.battle.status !== "battle") return;
      await autoActOnce();
    }, getSpeedMs() + 180);
  }

  function activeAlly() {
    return window.aliveParty ? window.aliveParty()[0] : null;
  }

  function aliveEnemies() {
    return (window.state?.battle?.enemies || []).filter(e => e.currentHp > 0);
  }

  function activeEnemy() {
    return aliveEnemies()[0] || null;
  }

  function skillData(skillId) {
    return (window.skills || {})[skillId];
  }

  function maxStats(mon) {
    if (window.maxStats) return window.maxStats(mon);
    const sp = window.species?.[mon.speciesId];
    const out = {};
    for (const k of Object.keys(sp.base)) out[k] = sp.base[k] + sp.growth[k] * (mon.level - 1) + (mon.bonus?.[k] || 0);
    return out;
  }

  function addLog(text) {
    if (window.addLog) window.addLog(text);
    else if (window.state?.battle?.log) window.state.battle.log.push(text);
  }

  function saveState() {
    if (window.saveState) window.saveState();
  }

  function safeRenderBattle() {
    if (window.renderBattle) window.renderBattle();
    ensureAutoUi();
    paintDefeatedEnemies();
    augmentBattleButtons();
  }

  function enemyIndex(mon) {
    const enemies = window.state?.battle?.enemies || [];
    return enemies.indexOf(mon);
  }

  function getArena() {
    return document.querySelector("#battleView .arena") || document.querySelector("#battleView");
  }

  function effectLabel(text, kind = "attack") {
    const arena = getArena();
    if (!arena) return;
    const label = document.createElement("div");
    label.className = "v14-effect-label " + (kind || "");
    label.textContent = text;
    arena.appendChild(label);
    setTimeout(() => label.remove(), 900);
  }

  function damagePop(text, side = "enemy", kind = "damage", index = 0) {
    const arena = getArena();
    if (!arena) return;
    const pop = document.createElement("div");
    pop.className = "v14-damage-pop " + (kind || "");
    pop.textContent = text;
    if (side === "ally") {
      pop.style.left = (24 + Math.min(index, 2) * 30) + "%";
      pop.style.top = "70%";
    } else {
      pop.style.left = (24 + Math.min(index, 2) * 26) + "%";
      pop.style.top = "38%";
    }
    arena.appendChild(pop);
    setTimeout(() => pop.remove(), 850);
  }

  function hitFlash(side = "enemy", index = 0) {
    const arena = getArena();
    if (!arena) return;
    const flash = document.createElement("div");
    flash.className = "v14-hit-flash";
    if (side === "ally") {
      flash.style.left = (18 + Math.min(index, 2) * 31) + "%";
      flash.style.top = "66%";
    } else {
      flash.style.left = (18 + Math.min(index, 2) * 28) + "%";
      flash.style.top = "32%";
    }
    arena.appendChild(flash);
    setTimeout(() => flash.remove(), 520);
  }

  function lunge(side = "ally", index = 0) {
    let el = null;
    if (side === "enemy") {
      el = document.querySelectorAll("#battleView .enemy-slot .sprite")[index];
    } else {
      el = document.querySelectorAll("#battleView .ally-card")[index];
    }
    if (!el) return;
    el.classList.remove("v14-attacker-lunge");
    void el.offsetWidth;
    el.classList.add("v14-attacker-lunge");
    setTimeout(() => el.classList.remove("v14-attacker-lunge"), 450);
  }

  function paintDefeatedEnemies() {
    const enemies = window.state?.battle?.enemies || [];
    const slots = document.querySelectorAll("#battleView .enemy-slot");
    enemies.forEach((e, i) => {
      if (e.currentHp <= 0 && slots[i]) slots[i].classList.add("v14-defeated");
    });
  }

  function augmentBattleButtons() {
    const view = document.getElementById("battleView");
    if (!view || !window.state?.battle) return;

    const btns = [...view.querySelectorAll("button")];
    for (const btn of btns) {
      if (btn.textContent.trim() === "作戦" || btn.textContent.trim() === "おまかせ") {
        btn.textContent = V14.auto ? "解除" : "おまかせ";
        btn.onclick = function () {
          setAutoBattle(!V14.auto);
        };
      }
    }

    if (!view.querySelector(".v14-battle-note") && window.state.battle.status === "battle") {
      const arena = view.querySelector(".arena");
      if (arena) {
        const note = document.createElement("div");
        note.className = "v14-battle-note";
        note.textContent = V14.busy ? "演出中..." : "コマンド選択";
        arena.appendChild(note);
      }
    }
  }

  function calcDamage(attacker, defender, multiplier, skill = null) {
    const a = maxStats(attacker);
    const d = maxStats(defender);
    const type = skill?.type;
    const atkBase = skill && ["magic", "fire", "water", "storm"].includes(type) ? a.wis * 1.25 : a.atk;
    const defBase = d.def + (defender.tempDef || 0);
    const variance = 0.88 + Math.random() * 0.24;
    return Math.max(3, Math.floor((atkBase * multiplier - defBase * 0.45 + attacker.level * 2) * variance));
  }

  async function animatedDamage(attacker, defender, multiplier, label, skill = null, options = {}) {
    const targetSide = options.targetSide || "enemy";
    const attackerSide = options.attackerSide || "ally";
    const targetIndex = targetSide === "enemy" ? enemyIndex(defender) : (window.party ? window.party().indexOf(defender) : 0);
    const attackerIndex = attackerSide === "enemy" ? enemyIndex(attacker) : (window.party ? window.party().indexOf(attacker) : 0);
    const kind = skill ? (skill.type === "heal" ? "heal" : skill.type === "buff" ? "buff" : "skill") : "attack";
    effectLabel(label, kind);
    lunge(attackerSide, Math.max(0, attackerIndex));
    await wait(getSpeedMs() * 0.35);
    const damage = calcDamage(attacker, defender, multiplier, skill);
    defender.currentHp = Math.max(0, defender.currentHp - damage);
    hitFlash(targetSide, Math.max(0, targetIndex));
    damagePop(String(damage), targetSide, "damage", Math.max(0, targetIndex));
    addLog(`${attacker.nickname}の${label}！ ${defender.nickname}に${damage}ダメージ。`);
    if (defender.currentHp <= 0) {
      addLog(`${defender.nickname}を倒した！`);
    }
    saveState();
    safeRenderBattle();
    await wait(getSpeedMs() * 0.65);
    return damage;
  }

  async function animatedHeal(caster, target, skill) {
    const targetIndex = window.party ? window.party().indexOf(target) : 0;
    effectLabel(skill.name, "heal");
    lunge("ally", Math.max(0, window.party ? window.party().indexOf(caster) : 0));
    await wait(getSpeedMs() * 0.35);
    const amount = Math.max(12, Math.floor(maxStats(caster).wis * Math.abs(skill.power || 1)));
    const mx = maxStats(target);
    target.currentHp = Math.min(mx.hp, target.currentHp + amount);
    damagePop("+" + amount, "ally", "heal", Math.max(0, targetIndex));
    addLog(`${caster.nickname}は${skill.name}を使い、${target.nickname}を${amount}回復した！`);
    saveState();
    safeRenderBattle();
    await wait(getSpeedMs() * 0.65);
  }

  async function animatedBuff(caster, skill) {
    const idx = window.party ? window.party().indexOf(caster) : 0;
    effectLabel(skill.name, "buff");
    caster.tempDef = (caster.tempDef || 0) + 5;
    damagePop("UP", "ally", "buff", Math.max(0, idx));
    addLog(`${caster.nickname}は${skill.name}で身を固めた！`);
    saveState();
    safeRenderBattle();
    await wait(getSpeedMs());
  }

  async function enemyTurnAnimated() {
    const enemies = aliveEnemies();
    for (const enemy of enemies) {
      if (!window.aliveParty || !window.aliveParty().length) break;
      const targets = window.aliveParty();
      const target = targets[Math.floor(Math.random() * targets.length)];
      const usable = (enemy.skills || []).map(skillData).filter(sk => sk && sk.mp <= enemy.currentMp && sk.type !== "heal" && sk.type !== "buff");
      const skill = usable.length ? usable[Math.floor(Math.random() * usable.length)] : null;
      if (skill) {
        enemy.currentMp -= skill.mp;
        await animatedDamage(enemy, target, skill.power * 0.88, skill.name, skill, { attackerSide: "enemy", targetSide: "ally" });
      } else {
        await animatedDamage(enemy, target, 0.82, "攻撃", null, { attackerSide: "enemy", targetSide: "ally" });
      }
      if (await checkBattleEndV14()) break;
    }
  }

  function snapshotPartyExp() {
    if (!window.party) return [];
    return window.party().map(m => ({
      uid: m.uid,
      name: m.nickname,
      level: m.level,
      exp: m.exp,
      next: window.expToNext ? window.expToNext(m.level) : 100
    }));
  }

  function applyExpWithSnapshot(exp) {
    const before = snapshotPartyExp();
    if (window.gainExp) window.gainExp(exp);
    const after = snapshotPartyExp();
    return { before, after };
  }

  async function checkBattleEndV14() {
    const b = window.state?.battle;
    if (!b) return true;

    if (!window.aliveParty || !window.aliveParty().length) {
      addLog("味方が全滅した……");
      b.status = "lose";
      V14.auto = false;
      V14.lastResult = {
        type: "lose",
        exp: 0,
        gold: 0,
        item: null,
        partyExp: { before: snapshotPartyExp(), after: snapshotPartyExp() },
        finalFloor: false
      };
      saveState();
      safeRenderBattle();
      showResultOverlay(V14.lastResult);
      return true;
    }

    if (!aliveEnemies().length) {
      const exp = b.enemies.reduce((sum, e) => sum + 12 + e.level * 5 + ((window.rankValue || {F:1})[window.species?.[e.speciesId]?.rank] || 1) * 4, 0);
      const gold = b.enemies.reduce((sum, e) => sum + 8 + e.level * 3, 0);
      b.reward = b.reward || { exp: 0, gold: 0 };
      b.reward.exp += exp;
      b.reward.gold += gold;
      addLog(`勝利！ 経験値${exp} / ${gold}Gを獲得予定。`);
      const partyExp = applyExpWithSnapshot(exp);
      const dungeon = (window.dungeons || []).find(d => d.id === b.dungeonId);
      const finalFloor = b.floor >= b.maxFloor;
      b.status = finalFloor ? "dungeonClear" : "floorClear";
      if (finalFloor && dungeon) addLog(`${dungeon.name}を踏破した！`);
      V14.auto = false;
      V14.lastResult = {
        type: "win",
        exp,
        gold,
        item: null,
        partyExp,
        finalFloor
      };
      saveState();
      safeRenderBattle();
      showResultOverlay(V14.lastResult);
      return true;
    }
    return false;
  }

  async function postPlayerActionV14() {
    if (await checkBattleEndV14()) {
      setBusy(false);
      updateAutoUi();
      return;
    }
    await enemyTurnAnimated();
    if (window.ui) window.ui.battleTurn = (window.ui.battleTurn || 1) + 1;
    await checkBattleEndV14();
    setBusy(false);
    updateAutoUi();
    safeRenderBattle();
    if (V14.auto) scheduleAuto();
  }

  async function attackWithFirstAlly() {
    if (V14.busy || !window.state?.battle || window.state.battle.status !== "battle") return;
    const ally = activeAlly();
    const enemy = activeEnemy();
    if (!ally || !enemy) return;
    setBusy(true);
    await animatedDamage(ally, enemy, 1.0, "攻撃", null, { attackerSide: "ally", targetSide: "enemy" });
    await postPlayerActionV14();
  }

  async function skillWithFirstAlly() {
    if (V14.busy || !window.state?.battle || window.state.battle.status !== "battle") return;
    const ally = activeAlly();
    const enemy = activeEnemy();
    if (!ally || !enemy) return;
    const usable = (ally.skills || []).map(skillData).filter(sk => sk && (sk.mp || 0) <= ally.currentMp);
    if (!usable.length) {
      addLog(`${ally.nickname}はMPが足りない！`);
      safeRenderBattle();
      return;
    }
    const sk = usable[0];
    setBusy(true);
    ally.currentMp -= sk.mp || 0;
    if (sk.type === "heal") {
      const target = window.party().filter(m => m.currentHp > 0).sort((a,b) => (a.currentHp/maxStats(a).hp) - (b.currentHp/maxStats(b).hp))[0] || ally;
      await animatedHeal(ally, target, sk);
    } else if (sk.type === "buff") {
      await animatedBuff(ally, sk);
    } else {
      await animatedDamage(ally, enemy, sk.power || 1, sk.name, sk, { attackerSide: "ally", targetSide: "enemy" });
    }
    await postPlayerActionV14();
  }

  async function autoActOnce() {
    if (V14.busy || !V14.auto || !window.state?.battle || window.state.battle.status !== "battle") return;
    const ally = activeAlly();
    if (!ally) return;
    const usableSkills = (ally.skills || []).map(skillData).filter(sk => sk && (sk.mp || 0) <= ally.currentMp);
    const healSkill = usableSkills.find(sk => sk.type === "heal");
    const lowHp = window.party().find(m => m.currentHp > 0 && m.currentHp / maxStats(m).hp < 0.45);
    if (healSkill && lowHp) {
      await skillWithFirstAlly();
    } else if (usableSkills.length && Math.random() < 0.42) {
      await skillWithFirstAlly();
    } else {
      await attackWithFirstAlly();
    }
  }

  function ensureResultOverlay() {
    let overlay = document.getElementById("v14ResultOverlay");
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.id = "v14ResultOverlay";
      overlay.className = "v14-result-overlay";
      document.body.appendChild(overlay);
    }
    return overlay;
  }

  function expPercent(member) {
    const next = Math.max(1, member.next || 100);
    return Math.max(0, Math.min(100, Math.round((member.exp || 0) / next * 100)));
  }

  function showResultOverlay(result) {
    setAutoBattle(false);
    const overlay = ensureResultOverlay();
    const after = result.partyExp?.after || snapshotPartyExp();
    const before = result.partyExp?.before || after;
    const levelMap = new Map(before.map(m => [m.uid, m.level]));
    if (result.type === "lose") {
      overlay.innerHTML = `
        <div class="v14-result-card">
          <div class="v14-result-title">敗北</div>
          <div class="v14-result-box">拠点へ戻って態勢を整えましょう</div>
          <div class="v14-result-actions">
            <button class="v14-next-btn" onclick="window.v14FinishLoseResult()">拠点へ戻る</button>
          </div>
        </div>`;
      overlay.classList.add("show");
      return;
    }

    overlay.innerHTML = `
      <div class="v14-result-card">
        <div class="v14-result-title">WIN</div>
        <div class="v14-result-summary">
          <div class="v14-result-box">EXP<br><span style="font-size:24px">${result.exp || 0}</span></div>
          <div class="v14-result-box">G<br><span style="font-size:24px">${result.gold || 0}</span></div>
        </div>
        <div class="v14-result-box" style="margin-bottom:12px;">入手アイテム<br>${result.item ? result.item : "なし"}</div>
        <div class="v14-result-party">
          ${after.map(m => {
            const leveled = m.level > (levelMap.get(m.uid) || m.level);
            return `
              <div class="v14-result-member">
                <div class="v14-result-icon"></div>
                <div>
                  <div style="font-weight:1000">${escapeHtmlV14(m.name)}</div>
                  <div style="font-size:12px">Lv ${m.level} ${leveled ? '<span class="v14-levelup">Lv UP!</span>' : ''}</div>
                  <div class="v14-expbar"><div class="v14-expfill" style="width:${expPercent(m)}%"></div></div>
                </div>
                <div style="font-weight:900">${m.exp}/${m.next}</div>
              </div>`;
          }).join("")}
        </div>
        <div class="v14-result-actions">
          <button class="v14-next-btn" onclick="window.v14ResultNext()">${result.finalFloor ? "報酬を受け取る" : "次の階層へ"}</button>
        </div>
      </div>`;
    overlay.classList.add("show");
  }

  function hideResultOverlay() {
    const overlay = document.getElementById("v14ResultOverlay");
    if (overlay) overlay.classList.remove("show");
  }

  function escapeHtmlV14(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  window.v14ResultNext = function () {
    hideResultOverlay();
    const b = window.state?.battle;
    if (!b) return;
    if (b.status === "dungeonClear") {
      if (window.finishDungeon) window.finishDungeon();
      return;
    }
    if (b.status === "floorClear") {
      if (window.nextFloor) window.nextFloor();
      return;
    }
    safeRenderBattle();
  };

  window.v14FinishLoseResult = function () {
    hideResultOverlay();
    if (window.finishLose) window.finishLose();
  };

  // Wrap existing renderBattle to add UI augmentation after every render.
  const originalRenderBattle = window.renderBattle;
  if (typeof originalRenderBattle === "function") {
    window.renderBattle = function () {
      const r = originalRenderBattle.apply(this, arguments);
      ensureAutoUi();
      updateAutoUi();
      paintDefeatedEnemies();
      augmentBattleButtons();
      return r;
    };
  }

  // Override high-level commands with animated versions while preserving submenus when present.
  window.playerAttack = function () {
    attackWithFirstAlly();
  };

  window.playerSkill = function () {
    skillWithFirstAlly();
  };

  const originalToggleAutoBattle = window.toggleAutoBattle;
  window.toggleAutoBattle = function () {
    setAutoBattle(!V14.auto);
  };

  // Wrap manual command execution hooks if v1.3 defined them.
  // For buttons that still call dealDamage/postPlayerAction internally, our top-level attack/skill cover the common path.
  // Keep scout/items mostly intact but refresh overlay state afterward.
  const originalPlayerScout = window.playerScout;
  if (typeof originalPlayerScout === "function") {
    window.playerScout = function () {
      if (V14.busy) return;
      const r = originalPlayerScout.apply(this, arguments);
      setTimeout(() => {
        saveState();
        safeRenderBattle();
        if (window.state?.battle?.status === "battle" && V14.auto) scheduleAuto();
      }, 120);
      return r;
    };
  }

  // If the existing checkBattleEnd is called by older command paths, show result screen too.
  const originalCheckBattleEnd = window.checkBattleEnd;
  if (typeof originalCheckBattleEnd === "function") {
    window.checkBattleEnd = function () {
      const beforeStatus = window.state?.battle?.status;
      const result = originalCheckBattleEnd.apply(this, arguments);
      const b = window.state?.battle;
      if (b && result && (b.status === "floorClear" || b.status === "dungeonClear") && beforeStatus !== b.status) {
        V14.lastResult = {
          type: "win",
          exp: 0,
          gold: 0,
          item: null,
          partyExp: { before: snapshotPartyExp(), after: snapshotPartyExp() },
          finalFloor: b.status === "dungeonClear"
        };
        showResultOverlay(V14.lastResult);
      }
      return result;
    };
  }

  // Disable old auto loop if it existed, because V14 controls it.
  if (window.ui) window.ui.autoBattle = false;

  ensureAutoUi();
  if (typeof window.renderBattle === "function") window.renderBattle();

  window.MonsterRpgV14 = {
    setAutoBattle,
    attackWithFirstAlly,
    skillWithFirstAlly,
    showResultOverlay,
    version: V14.version
  };
})();
</script>


<script id="v15-fixed-shell-script">
(function () {
  "use strict";

  function isScrollable(el) {
    while (el && el !== document.body) {
      const style = window.getComputedStyle(el);
      const overflowY = style.overflowY;
      if ((overflowY === "auto" || overflowY === "scroll") && el.scrollHeight > el.clientHeight) {
        return true;
      }
      el = el.parentElement;
    }
    return false;
  }

  document.addEventListener("touchmove", function (event) {
    if (!isScrollable(event.target)) {
      event.preventDefault();
    }
  }, { passive: false });

  function updateHeaderLabel() {
    const badge = document.querySelector(".game-header-badge");
    if (!badge) return;
    const active = document.querySelector(".view.active");
    const map = {
      titleView: "Ver.2.0.1",
      fieldView: "FIELD",
      battleView: "BATTLE",
      eventView: "EVENT"
    };
    badge.textContent = map[active?.id] || "Ver.2.0.1";
  }

  const originalSwitchView = window.switchView;
  if (typeof originalSwitchView === "function") {
    window.switchView = function () {
      const result = originalSwitchView.apply(this, arguments);
      setTimeout(updateHeaderLabel, 0);
      return result;
    };
  }

  const originalRender = window.render;
  if (typeof originalRender === "function") {
    window.render = function () {
      const result = originalRender.apply(this, arguments);
      setTimeout(updateHeaderLabel, 0);
      return result;
    };
  }

  updateHeaderLabel();
})();
</script>


<script id="v16-field-layout-fix-script">
(function () {
  "use strict";

  function relabelFieldButtons() {
    const fieldView = document.getElementById("fieldView");
    if (!fieldView) return;

    const sideStacks = fieldView.querySelectorAll(".field-main-grid .side-stack");
    const left = sideStacks[0];
    const right = sideStacks[1];
    if (left) {
      const btns = left.querySelectorAll("button");
      const labels = [
        { ico: "🧰", text: "メニュー" },
        { ico: "🔁", text: "パーティ" },
        { ico: "📝", text: "セーブ" }
      ];
      btns.forEach((btn, i) => {
        if (!labels[i]) {
          btn.style.display = "none";
          return;
        }
        const ico = btn.querySelector(".ico");
        if (ico) ico.textContent = labels[i].ico;
        const txtNode = [...btn.childNodes].find(n => n.nodeType === Node.TEXT_NODE && n.textContent.trim());
        if (txtNode) {
          txtNode.textContent = labels[i].text;
        } else {
          btn.append(" " + labels[i].text);
        }
      });
    }

    if (right) {
      right.style.pointerEvents = "none";
    }

    const pad = fieldView.querySelector(".control-pad");
    if (pad && !pad.querySelector(".pad-base")) {
      pad.innerHTML = '<div class="pad-base"><div class="pad-center">MOVE</div></div>';
    }
  }

  const originalRenderField = window.renderField;
  if (typeof originalRenderField === "function") {
    window.renderField = function () {
      const result = originalRenderField.apply(this, arguments);
      setTimeout(relabelFieldButtons, 0);
      return result;
    };
  }

  const originalRender = window.render;
  if (typeof originalRender === "function") {
    window.render = function () {
      const result = originalRender.apply(this, arguments);
      setTimeout(relabelFieldButtons, 0);
      return result;
    };
  }

  setTimeout(relabelFieldButtons, 0);
})();
</script>

  `;
  document.head.appendChild(style);

  const iconBySpecies = {
    aqua: "💧",
    bloom: "🍍",
    thorn: "⚡",
    ember: "🔥",
    pebble: "🪨"
  };

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function ensureFieldState() {
    if (!window.ui) return;
    if (!ui.fieldPos) {
      const saved = window.state?.fieldLayout?.pos;
      ui.fieldPos = saved ? { x: saved.x, y: saved.y } : { x: 52, y: 63 };
    }
    ui.fieldOverlay = ui.fieldOverlay || null;
    if (!ui.fieldAreaName) ui.fieldAreaName = "潮風の入り江";
  }

  function persistFieldState() {
    if (!window.state || !window.ui) return;
    state.fieldLayout = state.fieldLayout || {};
    state.fieldLayout.pos = { x: ui.fieldPos.x, y: ui.fieldPos.y };
    if (typeof window.saveState === "function") window.saveState();
  }

  function monsterIcon(mon) {
    return iconBySpecies[mon?.speciesId] || "✦";
  }

  function formatPlayTime() {
    const sec = Math.floor((window.state?.playTime || 0) / 1000);
    const h = String(Math.floor(sec / 3600)).padStart(1, "0");
    const m = String(Math.floor((sec % 3600) / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${h}:${m}:${s}`;
  }

  function openFieldPanelOverlay(panel) {
    ensureFieldState();
    ui.fieldPanel = panel;
    ui.fieldOverlay = "panel";
    if (typeof window.render === "function") window.render();
  }

  function openFieldSaveOverlay() {
    ensureFieldState();
    ui.fieldOverlay = "save";
    if (typeof window.render === "function") window.render();
  }

  function closeFieldOverlay() {
    if (!window.ui) return;
    ui.fieldOverlay = null;
    if (typeof window.render === "function") window.render();
  }

  function confirmFieldSave() {
    if (typeof window.saveNow === "function") window.saveNow();
    closeFieldOverlay();
  }

  function moveFieldPlayer(dx, dy) {
    ensureFieldState();
    ui.fieldPos.x = clamp(ui.fieldPos.x + dx, 10, 90);
    ui.fieldPos.y = clamp(ui.fieldPos.y + dy, 14, 90);
    persistFieldState();
    if (typeof window.render === "function") window.render();
  }

  let moveTimer = null;
  function startFieldMove(dir) {
    const map = {
      up: [0, -4],
      down: [0, 4],
      left: [-4, 0],
      right: [4, 0]
    };
    const step = map[dir];
    if (!step) return;
    stopFieldMove();
    moveFieldPlayer(step[0], step[1]);
    moveTimer = window.setInterval(() => moveFieldPlayer(step[0], step[1]), 140);
  }
  function stopFieldMove() {
    if (moveTimer) {
      clearInterval(moveTimer);
      moveTimer = null;
    }
  }

  function renderFieldOverlay() {
    ensureFieldState();
    if (ui.fieldOverlay === "save") {
      const team = (typeof party === "function" ? party() : []).slice(0, 3);
      return `
        <div class="overlay-scrim" onclick="closeFieldOverlay()">
          <div class="overlay-card wood v17-field-modal" onclick="event.stopPropagation()">
            <div class="overlay-close"><button class="small-btn" onclick="closeFieldOverlay()">閉じる</button></div>
            <div class="modal-title">セーブ</div>
            <div class="v17-save-summary">
              ${team.map(mon => `
                <div class="v17-save-card">
                  <div class="v17-save-icon">${monsterIcon(mon)}</div>
                  <div class="tiny" style="font-weight:900;">${escapeHtml(mon.nickname)}</div>
                  <div class="tiny muted">Lv ${mon.level}</div>

            <div class="v17-save-table">
              <div class="v17-save-row"><b>プレイヤー名</b><span>${escapeHtml(state.playerName || "主人公")}</span></div>
