            </div>
            <div class="v17-save-dialog">
              <div class="name" style="margin-bottom:12px;">セーブしますか？</div>
              <div class="btn-row" style="justify-content:center;">
                <button class="small-btn" onclick="closeFieldOverlay()">いいえ</button>
                <button class="small-btn" onclick="confirmFieldSave()">はい</button>
              </div>
            </div>
          </div>
        </div>`;
    }

    if (ui.fieldOverlay === "panel") {
      return `
        <div class="overlay-scrim" onclick="closeFieldOverlay()">
          <div class="overlay-card wood v17-field-modal" onclick="event.stopPropagation()">
            <div class="overlay-close"><button class="small-btn" onclick="closeFieldOverlay()">閉じる</button></div>
            ${typeof renderFieldPanelContent === "function" ? renderFieldPanelContent() : ""}
          </div>
        </div>`;
    }
    return "";
  }

  window.openFieldPanelOverlay = openFieldPanelOverlay;
  window.openFieldSaveOverlay = openFieldSaveOverlay;
  window.closeFieldOverlay = closeFieldOverlay;
  window.confirmFieldSave = confirmFieldSave;
  window.moveFieldPlayer = moveFieldPlayer;
  window.startFieldMove = startFieldMove;
  window.stopFieldMove = stopFieldMove;

  const originalSetFieldPanel = window.setFieldPanel;
  window.setFieldPanel = function (name) {
    if (window.ui) {
      ui.fieldPanel = name;
      if (document.getElementById("fieldView")?.classList.contains("active") && ui.fieldOverlay === "panel") {
        if (typeof window.render === "function") window.render();
        return;
      }
    }
    if (typeof originalSetFieldPanel === "function") return originalSetFieldPanel.apply(this, arguments);
    if (typeof window.renderField === "function") window.renderField();
  };

  const originalStartDungeon = window.startDungeon;
  if (typeof originalStartDungeon === "function") {
    window.startDungeon = function () {
      if (window.ui) ui.fieldOverlay = null;
      return originalStartDungeon.apply(this, arguments);
    };
  }

  window.renderField = function () {
    ensureFieldState();
    const el = document.getElementById("fieldView");
    if (!el) return;
    const selected = (typeof dungeons !== "undefined" ? dungeons.find(d => d.id === state.selectedDungeonId) || dungeons[0] : null);
    const x = ui.fieldPos.x;
    const y = ui.fieldPos.y;
    const hpRate = (typeof party === "function" && party()[0]) ? Math.round((party()[0].currentHp / maxStats(party()[0]).hp) * 100) : 100;
    const miniLeft = clamp(10 + (x / 100) * 80, 14, 90);
    const miniTop = clamp(18 + (y / 100) * 56, 18, 78);

    el.innerHTML = `
      <div class="field-layout v17-layout">
        <div class="v17-field-scene">
          <div class="v17-scene-badge left">⏰ ${new Date().getHours().toString().padStart(2,'0')}:${new Date().getMinutes().toString().padStart(2,'0')}</div>
          <div class="v17-scene-badge right">HP ${hpRate}%</div>
          <div class="v17-palm left"><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="trunk"></div></div>
          <div class="v17-palm right"><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="trunk"></div></div>
          <div class="v17-field-cliff"></div>
          <div class="v17-field-green"></div>
          <div class="v17-house"><div class="roof"></div><div class="body"></div><div class="door"></div><div class="stairs"></div></div>
          <div class="v17-field-flower"></div>
          <div class="v17-field-player" style="left:${x}%; top:${y}%">
            <div class="head"></div><div class="face"></div><div class="body"></div><div class="legs"></div><div class="shadow"></div>
          </div>
          <div class="v17-side-slime"><div class="mouth"></div></div>
        </div>

        <div class="v17-mini-wrap">
          <div class="v17-mini-map">
            <div class="v17-mini-land-a"></div>
            <div class="v17-mini-land-b"></div>
            <div class="v17-mini-tag">${escapeHtml(ui.fieldAreaName)}</div>
            <div class="v17-mini-caption">${escapeHtml(selected?.name || "探索エリア")}</div>
            <div class="v17-mini-mark" style="left:${miniLeft}%; top:${miniTop}%;"></div>
          </div>
        </div>

        <div class="v17-controls">
          <div class="v17-left-buttons">
            <button class="icon-btn" onclick="openFieldPanelOverlay('overview')"><span class="ico">🧰</span><span>メニュー</span></button>
            <button class="icon-btn" onclick="openFieldPanelOverlay('party')"><span class="ico">🔁</span><span>パーティ</span></button>
            <button class="icon-btn" onclick="openFieldSaveOverlay()"><span class="ico">📝</span><span>セーブ</span></button>
          </div>

          <div class="v17-pad-shell">
            <div class="v17-pad-grid">
              <div class="v17-pad-core"></div>
              <button class="v17-pad-btn up" onpointerdown="startFieldMove('up')" onpointerup="stopFieldMove()" onpointerleave="stopFieldMove()" ontouchend="stopFieldMove()">▲</button>
              <button class="v17-pad-btn left" onpointerdown="startFieldMove('left')" onpointerup="stopFieldMove()" onpointerleave="stopFieldMove()" ontouchend="stopFieldMove()">◀</button>
              <div class="v17-pad-center-label">MOVE</div>
              <button class="v17-pad-btn right" onpointerdown="startFieldMove('right')" onpointerup="stopFieldMove()" onpointerleave="stopFieldMove()" ontouchend="stopFieldMove()">▶</button>
              <button class="v17-pad-btn down" onpointerdown="startFieldMove('down')" onpointerup="stopFieldMove()" onpointerleave="stopFieldMove()" ontouchend="stopFieldMove()">▼</button>
            </div>
          </div>

          <div class="v17-right-spacer"></div>
        </div>
      </div>
      ${renderFieldOverlay()}`;
  };

  ensureFieldState();
})();
</script>


<script id="v18-battle-system-script">
(function () {
  "use strict";

  const ctx = window.v18ctx || {};
  const state = window.state || ctx.state;
  const ui = window.ui || ctx.ui;

  function skills(){ return window.skills || ctx.skills || {}; }
  function species(){ return window.species || ctx.species || {}; }
  function rankValue(){ return window.rankValue || ctx.rankValue || { F: 1, E: 2, D: 3, C: 4, B: 5, A: 6, S: 7 }; }
  function party(){ return (window.party || ctx.party)(); }
  function aliveParty(){ return (window.aliveParty || ctx.aliveParty)(); }
  function maxStats(mon){ return (window.maxStats || ctx.maxStats)(mon); }
  function addLog(text){ return (window.addLog || ctx.addLog)(text); }
  function saveState(){ return (window.saveState || ctx.saveState)(); }
  function renderBattle(){ return (window.renderBattle || ctx.renderBattle)(); }
  function getOwned(uid){ return (window.getOwned || ctx.getOwned)(uid); }
  function showToast(text){ return (window.showToast || ctx.showToast || alert)(text); }
  function unique(arr){ return (window.unique || ctx.unique || ((xs)=>[...new Set(xs)]))(arr); }
  function createMonster(speciesId, level){ return (window.createMonster || ctx.createMonster)(speciesId, level); }

  function enemyReward(enemy) {
    const sp = species()[enemy.speciesId] || { rank: "F" };
    const rv = rankValue()[sp.rank] || 1;
    return {
      exp: 12 + enemy.level * 5 + rv * 4,
      gold: 8 + enemy.level * 3
    };
  }

  function activeEnemies() {
    return (state.battle?.enemies || []).filter(e => e.currentHp > 0);
  }

  function firstAliveEnemy() {
    return activeEnemies()[0] || null;
  }

  function randomAliveEnemy() {
    const enemies = activeEnemies();
    return enemies[Math.floor(Math.random() * enemies.length)] || null;
  }

  function lowHpAlly() {
    return aliveParty()
      .filter(m => m.currentHp > 0)
      .sort((a, b) => (a.currentHp / maxStats(a).hp) - (b.currentHp / maxStats(b).hp))[0] || null;
  }

  function initBattleFlags() {
    if (!state.battle) return;
    state.battle.scoutAttempted = Boolean(state.battle.scoutAttempted);
    state.battle.commandQueue = state.battle.commandQueue || {};
  }

  function commandLabel(cmd) {
    if (!cmd) return "未設定";
    if (cmd.type === "attack") return "通常攻撃";
    const sk = skills()[cmd.skillId];
    return sk ? sk.name : "特技";
  }

  function clearOrders() {
    if (!state.battle) return;
    state.battle.commandQueue = {};
    ui.selectedAllyId = null;
    ui.selectedSkillId = null;
  }

  function alivePartyIds() {
    return aliveParty().map(m => m.uid);
  }

  function isAllOrdersReady() {
    const ids = alivePartyIds();
    const q = state.battle?.commandQueue || {};
    return ids.length > 0 && ids.every(id => Boolean(q[id]));
  }

  function queueCommand(uid, command) {
    initBattleFlags();
    state.battle.commandQueue[uid] = command;
    const mon = getOwned(uid);
    addLog(`${mon?.nickname || "仲間"}に「${commandLabel(command)}」を命令した。`);

    if (isAllOrdersReady()) {
      ui.battleMenu = "main";
      addLog("パーティ全員の命令がそろった！「戦う」で行動開始。");
    } else {
      ui.battleMenu = "orderAlly";
      const left = alivePartyIds().filter(id => !state.battle.commandQueue[id]).length;
      addLog(`残り${left}体の命令を選んでください。`);
    }
    saveState();
    renderBattle();
    decorateBattlePanel();
  }

  function performAttack(attacker, target) {
    if (!attacker || !target || target.currentHp <= 0) return;
    (window.dealDamage || ctx.dealDamage)(attacker, target, 1.0, "通常攻撃");
  }

  function performSkill(attacker, cmd) {
    const sk = skills()[cmd.skillId];
    if (!attacker || !sk) return;

    if ((attacker.currentMp || 0) < sk.mp) {
      addLog(`${attacker.nickname}はMPが足りず、通常攻撃に切り替えた！`);
      performAttack(attacker, firstAliveEnemy());
      return;
    }

    attacker.currentMp -= sk.mp;

    if (sk.type === "heal") {
      const target = getOwned(cmd.targetUid) || lowHpAlly() || attacker;
      const amount = Math.max(12, Math.floor(maxStats(attacker).wis * Math.abs(sk.power)));
      const max = maxStats(target);
      target.currentHp = Math.min(max.hp, target.currentHp + amount);
      addLog(`${attacker.nickname}は${sk.name}を使い、${target.nickname}を${amount}回復した！`);
      return;
    }

    if (sk.type === "buff") {
      attacker.tempDef = (attacker.tempDef || 0) + 5;
      addLog(`${attacker.nickname}は${sk.name}で身を固めた！`);
      return;
    }

    let target = state.battle.enemies[cmd.targetIndex];
    if (!target || target.currentHp <= 0) target = firstAliveEnemy();
    if (target) (window.dealDamage || ctx.dealDamage)(attacker, target, sk.power, sk.name, sk);
  }

  function chooseAutoCommand(mon) {
    const allSkills = skills();
    const usable = (mon.skills || []).map(id => allSkills[id]).filter(sk => sk && sk.mp <= mon.currentMp);
    const policy = mon.aiPolicy || "バランス重視";
    const enemy = firstAliveEnemy();

    if (policy === "特技を使うな") return { type: "attack", targetIndex: 0 };

    const low = lowHpAlly();
    const heal = usable.find(sk => sk.type === "heal");
    if (heal && low && low.currentHp / maxStats(low).hp < (policy === "いのち大事に" ? 0.75 : 0.45)) {
      return { type: "skill", skillId: heal.id, targetUid: low.uid };
    }

    if (policy === "MP節約" && Math.random() < 0.72) return { type: "attack", targetIndex: 0 };

    const attacks = usable.filter(sk => !["heal", "buff"].includes(sk.type));
    if (attacks.length && (policy === "ガンガン攻める" || policy === "回復・支援優先" ? Math.random() < 0.82 : Math.random() < 0.48)) {
      const sk = attacks[0];
      return { type: "skill", skillId: sk.id, targetIndex: state.battle.enemies.indexOf(enemy) };
    }

    const buff = usable.find(sk => sk.type === "buff");
    if (buff && policy === "回復・支援優先" && Math.random() < 0.35) {
      return { type: "skill", skillId: buff.id, targetUid: mon.uid };
    }

    return { type: "attack", targetIndex: state.battle.enemies.indexOf(enemy) };
  }

  function checkEndAfterPartyActions() {
    if (!aliveParty().length) {
      addLog("味方が全滅した……");
      state.battle.status = "lose";
      return true;
    }

    if (!activeEnemies().length) {
      if (typeof window.checkBattleEnd === "function") return window.checkBattleEnd();
      return ctx.checkBattleEnd();
    }

    return false;
  }

  function runEnemyTurnOnce() {
    if ((window.enemyTurn || ctx.enemyTurn)) (window.enemyTurn || ctx.enemyTurn)();
    ui.battleTurn = (ui.battleTurn || 1) + 1;
    ui.battleMenu = "main";
    clearOrders();
    if (typeof window.checkBattleEnd === "function") window.checkBattleEnd();
    else ctx.checkBattleEnd();
    saveState();
    renderBattle();
    decorateBattlePanel();
  }

  function executePartyTurn(commands, sourceLabel) {
    if (!state.battle || state.battle.status !== "battle") return;
    initBattleFlags();

    addLog(sourceLabel);

    for (const mon of aliveParty()) {
      if (!activeEnemies().length) break;
      const cmd = commands[mon.uid] || chooseAutoCommand(mon);
      if (!cmd) continue;
      if (cmd.type === "skill") performSkill(mon, cmd);
      else performAttack(mon, state.battle.enemies[cmd.targetIndex] || firstAliveEnemy());
    }

    if (checkEndAfterPartyActions()) {
      clearOrders();
      saveState();
      renderBattle();
      decorateBattlePanel();
      return;
    }

    runEnemyTurnOnce();
  }

  function playerFightV18() {
    if (!state.battle || state.battle.status !== "battle") return;
    initBattleFlags();

    const q = state.battle.commandQueue || {};
    const hasOrders = Object.keys(q).length > 0;

    if (hasOrders && !isAllOrdersReady()) {
      const left = alivePartyIds().filter(id => !q[id]).length;
      showToast(`まだ${left}体の命令が未設定です`);
      ui.battleMenu = "orderAlly";
      renderBattle();
      decorateBattlePanel();
      return;
    }

    if (hasOrders) {
      executePartyTurn(q, "命令どおりにパーティ全員が行動！");
      return;
    }

    const autoCommands = {};
    for (const mon of aliveParty()) autoCommands[mon.uid] = chooseAutoCommand(mon);
    executePartyTurn(autoCommands, "パーティ全員がオート行動！");
  }

  function openBattleMenuV18(name) {
    initBattleFlags();

    if (name === "orderAlly") {
      clearOrders();
      ui.battleMenu = "orderAlly";
      addLog("パーティ全員の行動を選んでください。");
      saveState();
      renderBattle();
      decorateBattlePanel();
      return;
    }

    if (name === "scoutTarget" && state.battle.scoutAttempted) {
      showToast("この戦闘ではすでにスカウトを試しました");
      addLog("この戦闘でスカウトできるのは1体だけです。");
      ui.battleMenu = "main";
      renderBattle();
      decorateBattlePanel();
      return;
    }

    ui.battleMenu = name;
    renderBattle();
    decorateBattlePanel();
  }

  function backBattleMenuV18() {
    if (ui.battleMenu && String(ui.battleMenu).startsWith("order")) {
      // 命令途中の戻るは、選び直しやすいようにメインへ戻す
      ui.battleMenu = "main";
      renderBattle();
      decorateBattlePanel();
      return;
    }
    ui.battleMenu = "main";
    renderBattle();
    decorateBattlePanel();
  }

  function selectOrderAllyV18(uid) {
    initBattleFlags();
    if (state.battle.commandQueue?.[uid]) {
      showToast("この仲間の命令は設定済みです");
      return;
    }
    ui.selectedAllyId = uid;
    ui.battleMenu = "orderSkill";
    renderBattle();
    decorateBattlePanel();
  }

  function queueNormalAttackOrder() {
    const ally = getOwned(ui.selectedAllyId);
    const enemy = firstAliveEnemy();
    if (!ally || !enemy) return;
    queueCommand(ally.uid, { type: "attack", targetIndex: state.battle.enemies.indexOf(enemy) });
  }

  function selectOrderSkillV18(skillId) {
    const ally = getOwned(ui.selectedAllyId);
    const sk = skills()[skillId];
    if (!ally || !sk || sk.mp > ally.currentMp) return;
    ui.selectedSkillId = skillId;

    if (sk.type === "heal") {
      ui.battleMenu = "orderAllyTarget";
    } else if (sk.type === "buff") {
      queueCommand(ally.uid, { type: "skill", skillId, targetUid: ally.uid });
      return;
    } else {
      ui.battleMenu = "orderTarget";
    }

    renderBattle();
    decorateBattlePanel();
  }

  function selectOrderTargetV18(index) {
    const ally = getOwned(ui.selectedAllyId);
    const target = state.battle?.enemies?.[index];
    if (!ally || !target || target.currentHp <= 0) return;
    queueCommand(ally.uid, { type: "skill", skillId: ui.selectedSkillId, targetIndex: index });
  }

  function selectOrderAllyTargetV18(uid) {
    const ally = getOwned(ui.selectedAllyId);
    const target = getOwned(uid);
    if (!ally || !target) return;
    queueCommand(ally.uid, { type: "skill", skillId: ui.selectedSkillId, targetUid: uid });
  }

  function selectScoutTargetV18(index) {
    initBattleFlags();
    const enemy = state.battle?.enemies?.[index];
    if (!enemy || enemy.currentHp <= 0) return;

    if (state.battle.scoutAttempted) {
      showToast("この戦闘ではすでにスカウトを試しました");
      addLog("この戦闘でスカウトできるのは1体だけです。");
      ui.battleMenu = "main";
      renderBattle();
      decorateBattlePanel();
      return;
    }

    state.battle.scoutAttempted = true;

    const rate = (window.calculateScoutRate || ctx.calculateScoutRate)(enemy);
    const roll = Math.random() * 100;
    addLog(`${enemy.nickname}へスカウトアタック！ 成功率${rate}%`);
    state.battle.scoutBoost = 0;

    if (roll < rate) {
      const candidate = createMonster(enemy.speciesId, Math.max(1, enemy.level - 1));
      candidate.nickname = species()[enemy.speciesId].name;
      const reward = enemyReward(enemy);
      state.battle.pendingScout = { enemyIndex: index, candidate, reward, endBattleOnFinalize: true };
      enemy.currentHp = 0;
      addLog(`${enemy.nickname}のスカウトに成功！ この戦闘は勝利扱いになります。`);
      ui.battleMenu = "scoutName";
      saveState();
      renderBattle();
      decorateBattlePanel();
      return;
    }

    addLog(`${enemy.nickname}のスカウトに失敗した……`);
    ui.battleMenu = "main";
    saveState();
    // 失敗時は通常どおり敵ターンへ
    runEnemyTurnOnce();
  }

  function snapshotPartyExp() {
    return party().map(m => ({
      uid: m.uid,
      name: m.nickname,
      level: m.level,
      exp: m.exp,
      next: (window.expToNext || ctx.expToNext)(m.level)
    }));
  }

  function finalizeScoutV18(toParty) {
    const pending = state.battle?.pendingScout;
    if (!pending) return;

    const input = document.getElementById("scoutNameInput");
    const fallback = pending.candidate.nickname || species()[pending.candidate.speciesId].name;
    const name = (input?.value || fallback).trim().slice(0, 8) || fallback;
    pending.candidate.nickname = name;

    state.owned.push(pending.candidate);
    state.codex = unique([...(state.codex || []), pending.candidate.speciesId]);

    if (toParty && state.partyIds.length < 3) state.partyIds.push(pending.candidate.uid);
    else if (toParty && state.partyIds.length >= 3) showToast("パーティが満員なので牧場に送りました");

    if (pending.endBattleOnFinalize) {
      const before = snapshotPartyExp();
      const reward = pending.reward || enemyReward(state.battle.enemies[pending.enemyIndex]);

      state.battle.reward = state.battle.reward || { exp: 0, gold: 0 };
      state.battle.reward.exp += reward.exp;
      state.battle.reward.gold += reward.gold;

      addLog(`スカウト勝利！ ${pending.candidate.nickname}分の経験値${reward.exp} / ${reward.gold}Gを獲得予定。`);
      (window.gainExp || ctx.gainExp)(reward.exp);

      const finalFloor = state.battle.floor >= state.battle.maxFloor;
      state.battle.status = finalFloor ? "dungeonClear" : "floorClear";
      state.battle.pendingScout = null;
      ui.battleMenu = "main";
      clearOrders();
      saveState();

      const after = snapshotPartyExp();
      renderBattle();
      decorateBattlePanel();

      if (window.MonsterRpgV14?.showResultOverlay) {
        window.MonsterRpgV14.showResultOverlay({
          type: "win",
          exp: reward.exp,
          gold: reward.gold,
          item: "スカウト成功",
          partyExp: { before, after },
          finalFloor
        });
      }
      return;
    }

    state.battle.pendingScout = null;
    ui.battleMenu = "main";
    saveState();
    renderBattle();
    decorateBattlePanel();
  }

  function decorateBattlePanel() {
    if (!state.battle) return;

    if (ui.battleMenu === "orderSkill") {
      const submenuGrid = document.querySelector("#battleView .battle-submenu .submenu-grid.one");
      if (submenuGrid && !submenuGrid.querySelector(".v18-basic-attack-order")) {
        const btn = document.createElement("button");
        btn.className = "submenu-btn v18-basic-attack-order";
        btn.innerHTML = "<b>通常攻撃</b><br><span class='tiny'>MPを使わずに攻撃します</span>";
        btn.onclick = queueNormalAttackOrder;
        submenuGrid.insertBefore(btn, submenuGrid.firstChild);
      }
    }

    const grid = document.querySelector("#battleView .command-grid");
    if (!grid) return;

    const q = state.battle.commandQueue || {};
    const entries = aliveParty().map(m => ({ mon: m, cmd: q[m.uid] })).filter(x => x.cmd);
    if (!entries.length) return;

    const banner = document.createElement("div");
    banner.className = "v18-order-banner";
    banner.innerHTML = `命令設定中：${entries.length}/${aliveParty().length}体
      <div class="v18-order-list">
        ${entries.map(({ mon, cmd }) => `<span class="v18-order-chip">${escapeHtmlV18(mon.nickname)}：${escapeHtmlV18(commandLabel(cmd))}</span>`).join("")}
      </div>
      <div class="tiny muted" style="margin-top:5px;">全員分を設定したら「戦う」で行動開始します。</div>`;

    if (grid.parentNode && typeof grid.parentNode.insertBefore === "function") {
      grid.parentNode.insertBefore(banner, grid);
    } else if (typeof grid.before === "function") {
      grid.before(banner);
    } else if (typeof grid.prepend === "function") {
      grid.prepend(banner);
    }
  }

  function escapeHtmlV18(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  // Patch globals after v14/v17 so inline handlers use v1.8 behavior.
  window.playerAttack = playerFightV18;
  window.openBattleMenu = openBattleMenuV18;
  window.backBattleMenu = backBattleMenuV18;
  window.selectOrderAlly = selectOrderAllyV18;
  window.selectOrderSkill = selectOrderSkillV18;
  window.selectOrderTarget = selectOrderTargetV18;
  window.selectOrderAllyTarget = selectOrderAllyTargetV18;
  window.selectScoutTarget = selectScoutTargetV18;
  window.finalizeScout = finalizeScoutV18;
  window.queueNormalAttackOrder = queueNormalAttackOrder;

  // Also patch the public renderBattle wrapper so manual refreshes decorate the queue banner.
  const previousRenderBattle = window.renderBattle;
  window.renderBattle = function () {
    const result = previousRenderBattle ? previousRenderBattle.apply(this, arguments) : ctx.renderBattle();
    decorateBattlePanel();
    return result;
  };

  if (state?.battle) {
    initBattleFlags();
    setTimeout(decorateBattlePanel, 0);
  }

  window.MonsterRpgV18 = {
    version: "1.8.0",
    playerFightV18,
    openBattleMenuV18,
    selectScoutTargetV18,
    finalizeScoutV18
  };
})();
</script>


<script id="v19-analog-pad-no-longpress-script">
(function () {
  "use strict";

  const MOVE_INTERVAL_MS = 92;
  const MOVE_STEP = 3.2;
  const KNOB_LIMIT_RATIO = 0.32;

  let activePad = null;
  let activePointerId = null;
  let direction = { x: 0, y: 0 };
  let moveTimer = null;

  function preventBrowserGameGestures() {
    const prevent = (event) => {
      const target = event.target;
      if (
        target &&
        (
          target.closest?.(".device") ||
          target.closest?.("#fieldView") ||
          target.closest?.(".v19-analog-pad")
        )
      ) {
        event.preventDefault();
      }
    };

    document.addEventListener("contextmenu", prevent, { passive: false });
    document.addEventListener("gesturestart", prevent, { passive: false });
    document.addEventListener("gesturechange", prevent, { passive: false });
    document.addEventListener("gestureend", prevent, { passive: false });

    let lastTouchEnd = 0;
    document.addEventListener("touchend", function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 340 && event.target?.closest?.(".device")) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });
  }

  function quantize8(dx, dy) {
    const len = Math.hypot(dx, dy);
    if (len < 10) return { x: 0, y: 0 };

    const nx = dx / len;
    const ny = dy / len;
    const angle = Math.atan2(ny, nx);
    const sector = Math.round(angle / (Math.PI / 4));
    const qAngle = sector * (Math.PI / 4);

    return {
      x: Math.round(Math.cos(qAngle)),
      y: Math.round(Math.sin(qAngle))
    };
  }

  function applyMove() {
    if (!direction.x && !direction.y) return;
    const mover = window.moveFieldPlayer;
    if (typeof mover === "function") {
      mover(direction.x * MOVE_STEP, direction.y * MOVE_STEP);
    }
  }

  function updateKnob(pad, clientX, clientY) {
    const rect = pad.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const max = rect.width * KNOB_LIMIT_RATIO;
    const len = Math.hypot(dx, dy);

    if (len > max) {
      dx = dx / len * max;
      dy = dy / len * max;
    }

    const knob = pad.querySelector(".v19-pad-knob");
    if (knob) knob.style.transform = `translate(${dx}px, ${dy}px)`;

    direction = quantize8(dx, dy);
  }

  function startMoving(pad, event) {
    activePad = pad;
    activePointerId = event.pointerId;
    pad.classList.add("active");
    pad.setPointerCapture?.(event.pointerId);
    updateKnob(pad, event.clientX, event.clientY);
    applyMove();

    if (moveTimer) clearInterval(moveTimer);
    moveTimer = setInterval(applyMove, MOVE_INTERVAL_MS);
  }

  function movePad(event) {
    if (!activePad || event.pointerId !== activePointerId) return;
    event.preventDefault();
    updateKnob(activePad, event.clientX, event.clientY);
  }

  function stopMoving(event) {
    if (activePad && event?.pointerId === activePointerId) {
      activePad.releasePointerCapture?.(activePointerId);
    }

    if (moveTimer) {
      clearInterval(moveTimer);
      moveTimer = null;
    }

    if (activePad) {
      const knob = activePad.querySelector(".v19-pad-knob");
      if (knob) knob.style.transform = "translate(0, 0)";
      activePad.classList.remove("active");
    }

    activePad = null;
    activePointerId = null;
    direction = { x: 0, y: 0 };
  }

  function buildAnalogPad() {
    return `
      <div class="v19-analog-pad" aria-label="8方向移動パッド">
        <div class="v19-diagonal-a"></div>
        <div class="v19-diagonal-b"></div>
        <div class="v19-pad-ring"></div>
        <div class="v19-direction-dot up">▲</div>
        <div class="v19-direction-dot down">▼</div>
        <div class="v19-direction-dot left">◀</div>
        <div class="v19-direction-dot right">▶</div>
        <div class="v19-direction-dot ul">◢</div>
        <div class="v19-direction-dot ur">◣</div>
        <div class="v19-direction-dot dl">◥</div>
        <div class="v19-direction-dot dr">◤</div>
        <div class="v19-pad-center-text">MOVE</div>
        <div class="v19-pad-knob"></div>
      </div>`;
  }

  function enhanceAnalogPad() {
    const shell = document.querySelector("#fieldView .v17-pad-shell");
    if (!shell || shell.querySelector(".v19-analog-pad")) return;

    shell.innerHTML = buildAnalogPad();

    const pad = shell.querySelector(".v19-analog-pad");
    pad.addEventListener("pointerdown", function (event) {
      event.preventDefault();
      startMoving(pad, event);
    }, { passive: false });

    pad.addEventListener("pointermove", movePad, { passive: false });
    pad.addEventListener("pointerup", stopMoving, { passive: false });
    pad.addEventListener("pointercancel", stopMoving, { passive: false });
    pad.addEventListener("pointerleave", function (event) {
      if (activePad === pad) stopMoving(event);
    }, { passive: false });
  }

  const previousRenderField = window.renderField;
  if (typeof previousRenderField === "function") {
    window.renderField = function () {
      const result = previousRenderField.apply(this, arguments);
      enhanceAnalogPad();
      return result;
    };
  }

  const previousRender = window.render;
  if (typeof previousRender === "function") {
    window.render = function () {
      const result = previousRender.apply(this, arguments);
      setTimeout(enhanceAnalogPad, 0);
      return result;
    };
  }

  const observerTarget = document.getElementById("fieldView");
  if (observerTarget) {
    const observer = new MutationObserver(() => enhanceAnalogPad());
    observer.observe(observerTarget, { childList: true, subtree: true });
  }

  preventBrowserGameGestures();
  setTimeout(enhanceAnalogPad, 0);

  window.MonsterRpgV19 = {
    version: "1.9.0",
    enhanceAnalogPad
  };
})();
</script>


<script id="v191-battle-ui-tweaks-script">
(function () {
  "use strict";

  const state = window.state;
  const ui = window.ui;

  function partyList() {
    return (window.party ? window.party() : []) || [];
  }

  function cleanupOrderBanners() {
    const banners = Array.from(document.querySelectorAll('#battleView .v18-order-banner'));
    if (!banners.length) return;
    banners.forEach((banner, index) => {
      if (index > 0) banner.remove();
    });
  }

  function enhanceEnemyNames() {
    if (!state?.battle) return;
    const slots = Array.from(document.querySelectorAll('#battleView .enemy-sprite-row .enemy-slot'));
    slots.forEach((slot, index) => {
      const enemy = state.battle.enemies?.[index];
      slot.classList.remove('is-caution', 'is-danger');
      const hpBox = slot.querySelector('.enemy-hp');
      if (hpBox) hpBox.remove();
      const name = slot.querySelector('.enemy-name');
      if (!enemy || !name || enemy.currentHp <= 0) return;
      const maxFn = window.maxStats;
      const max = typeof maxFn === 'function' ? maxFn(enemy) : { hp: Math.max(enemy.currentHp || 1, 1) };
      const rate = max.hp > 0 ? enemy.currentHp / max.hp : 1;
      if (rate <= 0.15) slot.classList.add('is-danger');
      else if (rate < 0.5) slot.classList.add('is-caution');
    });
  }

  function ensureOverlay(layout) {
    let svg = layout.querySelector('.v191-target-overlay');
    if (svg) {
      svg.innerHTML = '';
      return svg;
    }
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'v191-target-overlay');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.innerHTML = '<defs><marker id="v191-arrow-attack" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#ffd56b"></path></marker><marker id="v191-arrow-heal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#6df0a7"></path></marker><marker id="v191-arrow-buff" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#76c7ff"></path></marker></defs>';
    layout.appendChild(svg);
    return svg;
  }

  function pointWithin(rect, xPct, yPct, relativeTo) {
    return {
      x: rect.left - relativeTo.left + rect.width * xPct,
      y: rect.top - relativeTo.top + rect.height * yPct
    };
  }

  function drawPath(svg, d, kind, label, labelPos) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', `arrow-path ${kind}`);
    path.setAttribute('marker-end', `url(#v191-arrow-${kind})`);
    svg.appendChild(path);

    if (label && labelPos) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', labelPos.x);
      text.setAttribute('y', labelPos.y);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('class', 'arrow-label');
      text.textContent = label;
      svg.appendChild(text);
    }
  }

  function renderCommandArrows() {
    if (!state?.battle || ui?.view !== 'battle') return;
    const layout = document.querySelector('#battleView .battle-layout');
    const allyCards = Array.from(document.querySelectorAll('#battleView .ally-row .ally-card'));
    const enemySlots = Array.from(document.querySelectorAll('#battleView .enemy-sprite-row .enemy-slot'));
    if (!layout || !allyCards.length) return;

    const commands = state.battle.commandQueue || {};
    const entries = Object.entries(commands);
    const svg = ensureOverlay(layout);
    if (!entries.length) return;

    const layoutRect = layout.getBoundingClientRect();
    const party = partyList();
    const allyIndexByUid = new Map(party.map((m, idx) => [m.uid, idx]));

    entries.forEach(([uid, cmd]) => {
      const sourceIndex = allyIndexByUid.get(uid);
      const sourceEl = sourceIndex != null ? allyCards[sourceIndex] : null;
      if (!sourceEl || !cmd) return;

      let targetEl = null;
      let kind = 'attack';
      let label = '攻撃';

      if (cmd.type === 'attack') {
        targetEl = enemySlots[cmd.targetIndex] || enemySlots.find(el => !el.classList.contains('defeated'));
      } else if (cmd.type === 'skill') {
        const skillMap = window.skills || {};
        const sk = skillMap[cmd.skillId];
        label = sk?.name || '特技';
        if (sk?.type === 'heal') {
          kind = 'heal';
          const targetIndex = party.findIndex(m => m.uid === cmd.targetUid);
          targetEl = targetIndex >= 0 ? allyCards[targetIndex] : sourceEl;
        } else if (sk?.type === 'buff') {
          kind = 'buff';
          const targetIndex = party.findIndex(m => m.uid === cmd.targetUid || m.uid === uid);
          targetEl = targetIndex >= 0 ? allyCards[targetIndex] : sourceEl;
        } else {
          kind = 'attack';
          targetEl = enemySlots[cmd.targetIndex] || enemySlots.find(el => !el.classList.contains('defeated'));
        }
      }

      if (!targetEl) return;

      const sourceRect = sourceEl.getBoundingClientRect();
      const targetRect = targetEl.getBoundingClientRect();
      const start = pointWithin(sourceRect, 0.5, 0.02, layoutRect);
      const end = targetEl.classList.contains('ally-card')
        ? pointWithin(targetRect, 0.5, 0.18, layoutRect)
        : pointWithin(targetRect, 0.5, 0.78, layoutRect);

      const verticalLift = targetEl.classList.contains('ally-card') ? -28 : -62;
      const midY = Math.min(start.y, end.y) + verticalLift;
      const c1 = { x: start.x, y: midY };
      const c2 = { x: end.x, y: midY };
      const d = `M ${start.x} ${start.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${end.x} ${end.y}`;
      const labelPos = { x: (start.x + end.x) / 2, y: midY - 6 };
      drawPath(svg, d, kind, label, labelPos);
    });
  }

  function applyBattleUiTweaks() {
    cleanupOrderBanners();
    enhanceEnemyNames();
    renderCommandArrows();
  }

  const previousRenderBattle = window.renderBattle;
  window.renderBattle = function () {
    const result = previousRenderBattle ? previousRenderBattle.apply(this, arguments) : undefined;
    requestAnimationFrame(applyBattleUiTweaks);
    return result;
  };

  const battleView = document.getElementById('battleView');
  if (battleView) {
    const observer = new MutationObserver(() => requestAnimationFrame(applyBattleUiTweaks));
    observer.observe(battleView, { childList: true, subtree: true });
  }

  window.addEventListener('resize', () => requestAnimationFrame(applyBattleUiTweaks));
  setTimeout(applyBattleUiTweaks, 0);

  window.MonsterRpgV191 = {
    version: '1.9.1',
    applyBattleUiTweaks
  };
})();
</script>


<script id="v192-analog-pad-hold-script">
(function () {
  "use strict";

  const MOVE_INTERVAL_MS = 92;
  const MOVE_STEP = 3.2;
  const KNOB_LIMIT_RATIO = 0.32;

  let activePad = null;
  let activePointerId = null;
  let direction = { x: 0, y: 0 };
  let moveTimer = null;
  let lastPointer = null;
  let knobOffset = { x: 0, y: 0 };

  function quantize8(dx, dy) {
    const len = Math.hypot(dx, dy);
    if (len < 10) return { x: 0, y: 0 };
    const nx = dx / len;
    const ny = dy / len;
    const angle = Math.atan2(ny, nx);
    const sector = Math.round(angle / (Math.PI / 4));
    const qAngle = sector * (Math.PI / 4);
    return {
      x: Math.round(Math.cos(qAngle)),
      y: Math.round(Math.sin(qAngle))
    };
  }

  function getPad() {
    return document.querySelector('#fieldView .v19-analog-pad');
  }

  function applyKnobTransform(pad, dx, dy) {
    const knob = pad?.querySelector('.v19-pad-knob');
    if (knob) knob.style.transform = `translate(${dx}px, ${dy}px)`;
  }

  function applyMove() {
    if (!direction.x && !direction.y) return;
    const mover = window.moveFieldPlayer;
    if (typeof mover === 'function') mover(direction.x * MOVE_STEP, direction.y * MOVE_STEP);
  }

  function updateKnob(pad, clientX, clientY) {
    if (!pad) return;
    const rect = pad.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const max = rect.width * KNOB_LIMIT_RATIO;
    const len = Math.hypot(dx, dy);
    if (len > max) {
      dx = dx / len * max;
      dy = dy / len * max;
    }
    knobOffset = { x: dx, y: dy };
    direction = quantize8(dx, dy);
    applyKnobTransform(pad, dx, dy);
  }

  function syncPadReference() {
    const current = getPad();
    if (!current) return null;
    activePad = current;
    if (activePointerId != null) {
      activePad.classList.add('active');
      applyKnobTransform(activePad, knobOffset.x, knobOffset.y);
    }
    return current;
  }

  function stopTimer() {
    if (moveTimer) {
      clearInterval(moveTimer);
      moveTimer = null;
    }
  }

  function ensureTimer() {
    stopTimer();
    moveTimer = window.setInterval(applyMove, MOVE_INTERVAL_MS);
  }

  function startMoving(pad, event) {
    activePad = pad;
    activePointerId = event.pointerId;
    lastPointer = { x: event.clientX, y: event.clientY };
    activePad.classList.add('active');
    activePad.setPointerCapture?.(event.pointerId);
    updateKnob(activePad, event.clientX, event.clientY);
    applyMove();
    ensureTimer();
  }

  function movePad(event) {
    if (activePointerId == null || event.pointerId !== activePointerId) return;
    event.preventDefault();
    lastPointer = { x: event.clientX, y: event.clientY };
    const pad = syncPadReference();
    if (!pad) return;
    updateKnob(pad, event.clientX, event.clientY);
  }

  function stopMoving(event) {
    if (activePointerId == null) return;
    if (event && event.pointerId != null && event.pointerId !== activePointerId) return;
    const pad = syncPadReference();
    if (pad) {
      try { pad.releasePointerCapture?.(activePointerId); } catch (e) {}
      applyKnobTransform(pad, 0, 0);
      pad.classList.remove('active');
    }
    stopTimer();
    activePad = null;
    activePointerId = null;
    lastPointer = null;
    knobOffset = { x: 0, y: 0 };
    direction = { x: 0, y: 0 };
  }

  function buildAnalogPad() {
    return `
      <div class="v19-analog-pad" aria-label="8方向移動パッド">
        <div class="v19-diagonal-a"></div>
        <div class="v19-diagonal-b"></div>
        <div class="v19-pad-ring"></div>
        <div class="v19-direction-dot up">▲</div>
        <div class="v19-direction-dot down">▼</div>
        <div class="v19-direction-dot left">◀</div>
        <div class="v19-direction-dot right">▶</div>
        <div class="v19-direction-dot ul">◢</div>
        <div class="v19-direction-dot ur">◣</div>
        <div class="v19-direction-dot dl">◥</div>
        <div class="v19-direction-dot dr">◤</div>
        <div class="v19-pad-center-text">MOVE</div>
        <div class="v19-pad-knob"></div>
      </div>`;
  }

  function bindPad(pad) {
    if (!pad || pad.dataset.v192Bound === '1') return;
    pad.dataset.v192Bound = '1';
    pad.addEventListener('pointerdown', function (event) {
      event.preventDefault();
      startMoving(pad, event);
    }, { passive: false });
  }

  function enhanceAnalogPadV192() {
    const shell = document.querySelector('#fieldView .v17-pad-shell');
    if (!shell) return;
    if (shell.dataset.v192Applied !== '1') {
      shell.innerHTML = buildAnalogPad();
      shell.dataset.v192Applied = '1';
    }
    const pad = shell.querySelector('.v19-analog-pad');
    bindPad(pad);
    if (activePointerId != null) {
      activePad = pad;
      pad.classList.add('active');
      if (lastPointer) updateKnob(pad, lastPointer.x, lastPointer.y);
      else applyKnobTransform(pad, knobOffset.x, knobOffset.y);
      ensureTimer();
    }
  }

  document.addEventListener('pointermove', movePad, { passive: false });
  document.addEventListener('pointerup', stopMoving, { passive: false });
  document.addEventListener('pointercancel', stopMoving, { passive: false });

  const prevRenderField = window.renderField;
  if (typeof prevRenderField === 'function') {
    window.renderField = function () {
      const result = prevRenderField.apply(this, arguments);
      setTimeout(enhanceAnalogPadV192, 0);
      return result;
    };
  }

  const prevRender = window.render;
  if (typeof prevRender === 'function') {
    window.render = function () {
      const result = prevRender.apply(this, arguments);
      setTimeout(enhanceAnalogPadV192, 0);
      return result;
    };
  }

  const observerTarget = document.getElementById('fieldView');
  if (observerTarget) {
    const observer = new MutationObserver(() => {
      setTimeout(enhanceAnalogPadV192, 0);
    });
    observer.observe(observerTarget, { childList: true, subtree: true });
  }

  window.addEventListener('blur', () => stopMoving());
  setTimeout(enhanceAnalogPadV192, 0);

  window.MonsterRpgV192 = {
    version: '1.9.2',
    enhanceAnalogPad: enhanceAnalogPadV192,
    stopMoving
  };
})();
</script>


<script id="v193-battle-log-tempo-script">
(function(){
  "use strict";

  const state = window.state;
  const ui = window.ui;
  const V193 = { resolving: false };

  function wait(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
  function battle(){ return state?.battle; }
  function party(){ return typeof window.party === 'function' ? window.party() : []; }
  function aliveParty(){ return typeof window.aliveParty === 'function' ? window.aliveParty() : party().filter(m => m.currentHp > 0); }
  function maxStats(mon){ return typeof window.maxStats === 'function' ? window.maxStats(mon) : { hp: mon.currentHp || 1, mp: mon.currentMp || 0, atk: 1, def: 1, wis: 1 }; }
  function skillMap(){ return window.skills || {}; }
  function speciesMap(){ return window.species || {}; }
  function rankValue(){ return window.rankValue || { F:1, E:2, D:3, C:4, B:5, A:6, S:7 }; }
  function getOwned(uid){ return typeof window.getOwned === 'function' ? window.getOwned(uid) : null; }
  function saveState(){ if (typeof window.saveState === 'function') window.saveState(); }
  function randomPick(arr){ return arr[Math.floor(Math.random() * arr.length)] || null; }
  function activeEnemies(){ return (battle()?.enemies || []).filter(e => e.currentHp > 0); }
  function firstAliveEnemy(){ return activeEnemies()[0] || null; }
  function currentActionMs(){ return ui?.battleSpeed === '高速' ? 750 : 1500; }
  function shortestDelay(ms){ return Math.max(120, ms); }

  function setSingleLog(text){
    if (!battle()) return;
    battle().log = [String(text)];
    syncBattleNote();
  }
  window.addLog = setSingleLog;

  function latestLog(){
    const logs = battle()?.log || [];
    return logs.length ? logs[logs.length - 1] : '';
  }

  function clearTransientFx(){
    if (V193.resolving) return;
    document.querySelectorAll('#battleView .v14-effect-label, #battleView .v14-damage-pop, #battleView .v14-hit-flash').forEach(el => el.remove());
  }

  function syncBattleNote(){
    const note = document.querySelector('#battleView .v14-battle-note');
    if (!note) return;
    const text = latestLog() || (V193.resolving ? '行動中...' : 'コマンド選択');
    note.textContent = text;
    note.title = text;
  }

  const previousRenderBattleV193 = window.renderBattle;
  window.renderBattle = function(){
    const result = previousRenderBattleV193 ? previousRenderBattleV193.apply(this, arguments) : undefined;
    requestAnimationFrame(() => { clearTransientFx(); syncBattleNote(); });
    return result;
  };

  function setBusy(value){
    V193.resolving = Boolean(value);
    const view = document.getElementById('battleView');
    if (view) view.classList.toggle('v14-command-lock', V193.resolving);
    syncBattleNote();
  }

  function getArena(){ return document.querySelector('#battleView .arena') || document.querySelector('#battleView'); }

  function effectLabel(text, kind = 'attack'){
    const arena = getArena();
    if (!arena) return;
    const label = document.createElement('div');
    label.className = 'v14-effect-label ' + kind;
    label.textContent = text;
    arena.appendChild(label);
    return label;
  }

  function damagePop(text, side = 'enemy', kind = 'damage', index = 0){
    const arena = getArena();
    if (!arena) return;
    const pop = document.createElement('div');
    pop.className = 'v14-damage-pop ' + (kind || '');
    pop.textContent = text;
    if (side === 'ally') {
      pop.style.left = (24 + Math.min(index, 2) * 30) + '%';
      pop.style.top = '70%';
    } else {
      pop.style.left = (24 + Math.min(index, 2) * 26) + '%';
      pop.style.top = '38%';
    }
    arena.appendChild(pop);
    return pop;
  }

  function hitFlash(side = 'enemy', index = 0){
    const arena = getArena();
    if (!arena) return;
    const flash = document.createElement('div');
    flash.className = 'v14-hit-flash';
    if (side === 'ally') {
      flash.style.left = (18 + Math.min(index, 2) * 31) + '%';
      flash.style.top = '66%';
    } else {
      flash.style.left = (18 + Math.min(index, 2) * 28) + '%';
      flash.style.top = '32%';
    }
    arena.appendChild(flash);
    return flash;
  }

  function lunge(side = 'ally', index = 0){
    let el = null;
    if (side === 'enemy') el = document.querySelectorAll('#battleView .enemy-slot .sprite')[index];
    else el = document.querySelectorAll('#battleView .ally-card')[index];
    if (!el) return;
    el.classList.remove('v14-attacker-lunge');
    void el.offsetWidth;
    el.classList.add('v14-attacker-lunge');
    setTimeout(() => el.classList.remove('v14-attacker-lunge'), 450);
  }

  function calcDamage(attacker, defender, multiplier, skill = null){
    const a = maxStats(attacker);
    const d = maxStats(defender);
    const type = skill?.type;
    const atkBase = skill && ['magic','fire','water','storm'].includes(type) ? a.wis * 1.25 : a.atk;
    const defBase = d.def + (defender.tempDef || 0);
    const variance = 0.88 + Math.random() * 0.24;
    return Math.max(3, Math.floor((atkBase * multiplier - defBase * 0.45 + attacker.level * 2) * variance));
  }

  function partyIndex(mon){ return party().findIndex(m => m.uid === mon.uid); }
  function enemyIndex(mon){ return battle()?.enemies?.indexOf(mon) ?? -1; }

  function alivePartyIds(){ return aliveParty().map(m => m.uid); }
  function isAllOrdersReady(){
    const ids = alivePartyIds();
    const q = battle()?.commandQueue || {};
    return ids.length > 0 && ids.every(id => Boolean(q[id]));
  }
  function clearOrders(){
    if (!battle()) return;
    battle().commandQueue = {};
    ui.selectedAllyId = null;
    ui.selectedSkillId = null;
  }

  function lowHpAlly(){
    return aliveParty().slice().sort((a,b)=> (a.currentHp / Math.max(1, maxStats(a).hp)) - (b.currentHp / Math.max(1, maxStats(b).hp)))[0] || null;
  }

  function chooseAutoCommand(mon){
    const allSkills = skillMap();
    const usable = (mon.skills || []).map(id => allSkills[id]).filter(sk => sk && sk.mp <= mon.currentMp);
    const policy = mon.aiPolicy || 'バランス重視';
    const enemy = firstAliveEnemy();
    if (!enemy) return null;
    if (policy === '特技を使うな') return { type: 'attack', targetIndex: battle().enemies.indexOf(enemy) };
    const low = lowHpAlly();
    const heal = usable.find(sk => sk.type === 'heal');
    if (heal && low && low.currentHp / Math.max(1, maxStats(low).hp) < (policy === 'いのち大事に' ? 0.75 : 0.45)) {
      return { type: 'skill', skillId: heal.id, targetUid: low.uid };
    }
    if (policy === 'MP節約' && Math.random() < 0.72) return { type: 'attack', targetIndex: battle().enemies.indexOf(enemy) };
    const attacks = usable.filter(sk => !['heal','buff'].includes(sk.type));
    if (attacks.length && ((policy === 'ガンガン攻める' || policy === '回復・支援優先') ? Math.random() < 0.82 : Math.random() < 0.48)) {
      const sk = attacks[0];
      return { type: 'skill', skillId: sk.id, targetIndex: battle().enemies.indexOf(enemy) };
    }
    const buff = usable.find(sk => sk.type === 'buff');
    if (buff && policy === '回復・支援優先' && Math.random() < 0.35) {
      return { type: 'skill', skillId: buff.id, targetUid: mon.uid };
    }
    return { type: 'attack', targetIndex: battle().enemies.indexOf(enemy) };
  }

  function snapshotPartyExp(){
    return party().map(m => ({ uid: m.uid, name: m.nickname, level: m.level, exp: m.exp, next: typeof window.expToNext === 'function' ? window.expToNext(m.level) : 100 }));
  }

  function showResult(type, exp, gold, finalFloor){
    const before = snapshotPartyExp();
    if (type === 'win' && typeof window.gainExp === 'function') window.gainExp(exp);
    const after = snapshotPartyExp();
    if (window.MonsterRpgV14?.showResultOverlay) {
      window.MonsterRpgV14.showResultOverlay({ type, exp, gold, item: null, partyExp: { before, after }, finalFloor });
    }
  }

  async function finishBattleIfNeeded(){
    const b = battle();
    if (!b) return true;
    if (!aliveParty().length) {
      setSingleLog('味方が全滅した……');
      b.status = 'lose';
      saveState();
      window.renderBattle();
      showResult('lose', 0, 0, false);
      return true;
    }
    if (!b.enemies.some(e => e.currentHp > 0)) {
      const exp = b.enemies.reduce((sum, e) => sum + 12 + e.level * 5 + (rankValue()[speciesMap()[e.speciesId]?.rank] || 1) * 4, 0);
      const gold = b.enemies.reduce((sum, e) => sum + 8 + e.level * 3, 0);
      b.reward = b.reward || { exp: 0, gold: 0 };
      b.reward.exp += exp;
      b.reward.gold += gold;
      const dungeon = (window.dungeons || []).find(d => d.id === b.dungeonId);
      const finalFloor = b.floor >= b.maxFloor;
      b.status = finalFloor ? 'dungeonClear' : 'floorClear';
      setSingleLog(finalFloor && dungeon ? `${dungeon.name}を踏破した！` : `勝利！ 経験値${exp} / ${gold}Gを獲得！`);
      saveState();
      window.renderBattle();
      showResult('win', exp, gold, finalFloor);
      return true;
    }
    return false;
  }

  async function animatedDamage(attacker, defender, multiplier, label, skill = null, options = {}){
    const total = currentActionMs();
    const targetSide = options.targetSide || 'enemy';
    const attackerSide = options.attackerSide || 'ally';
    const targetIndex = targetSide === 'enemy' ? enemyIndex(defender) : partyIndex(defender);
    const attackerIndex = attackerSide === 'enemy' ? enemyIndex(attacker) : partyIndex(attacker);
    const kind = skill ? 'skill' : 'attack';
    effectLabel(label, kind);
    lunge(attackerSide, Math.max(0, attackerIndex));
    await wait(shortestDelay(total * 0.14));
    const damage = calcDamage(attacker, defender, multiplier, skill);
    defender.currentHp = Math.max(0, defender.currentHp - damage);
    hitFlash(targetSide, Math.max(0, targetIndex));
    damagePop(String(damage), targetSide, 'damage', Math.max(0, targetIndex));
    const message = defender.currentHp <= 0
      ? `${attacker.nickname}の${label}！ ${defender.nickname}を倒した！`
      : `${attacker.nickname}の${label}！ ${defender.nickname}に${damage}ダメージ。`;
    setSingleLog(message);
    saveState();
    await wait(shortestDelay(total * 0.24));
    window.renderBattle();
    await wait(shortestDelay(total * 0.62));
  }

  async function animatedHeal(caster, target, skill){
    const total = currentActionMs();
    const idx = partyIndex(target);
    effectLabel(skill.name, 'heal');
    lunge('ally', Math.max(0, partyIndex(caster)));
    await wait(shortestDelay(total * 0.14));
    const amount = Math.max(12, Math.floor(maxStats(caster).wis * Math.abs(skill.power || 1)));
    const mx = maxStats(target);
    target.currentHp = Math.min(mx.hp, target.currentHp + amount);
    damagePop('+' + amount, 'ally', 'heal', Math.max(0, idx));
    setSingleLog(`${caster.nickname}は${skill.name}で${target.nickname}を${amount}回復！`);
    saveState();
    await wait(shortestDelay(total * 0.24));
    window.renderBattle();
    await wait(shortestDelay(total * 0.62));
  }

  async function animatedBuff(caster, target, skill){
    const total = currentActionMs();
    effectLabel(skill.name, 'buff');
    lunge('ally', Math.max(0, partyIndex(caster)));
    await wait(shortestDelay(total * 0.14));
    target.tempDef = (target.tempDef || 0) + 5;
    damagePop('UP', 'ally', 'buff', Math.max(0, partyIndex(target)));
    setSingleLog(`${caster.nickname}は${skill.name}で${target.nickname}を強化！`);
    saveState();
    await wait(shortestDelay(total * 0.24));
    window.renderBattle();
    await wait(shortestDelay(total * 0.62));
  }

  async function executePartyCommand(mon, cmd){
    if (!mon || mon.currentHp <= 0 || !battle()) return;
    if (!cmd) cmd = chooseAutoCommand(mon);
    if (!cmd) return;
    if (cmd.type === 'skill') {
      const sk = skillMap()[cmd.skillId];
      if (!sk || (mon.currentMp || 0) < sk.mp) {
        const fallback = firstAliveEnemy();
        if (fallback) await animatedDamage(mon, fallback, 1.0, '攻撃', null, { attackerSide: 'ally', targetSide: 'enemy' });
        return;
      }
      mon.currentMp -= sk.mp;
      saveState();
      window.renderBattle();
      if (sk.type === 'heal') {
        const target = getOwned(cmd.targetUid) || lowHpAlly() || mon;
        await animatedHeal(mon, target, sk);
      } else if (sk.type === 'buff') {
        const target = getOwned(cmd.targetUid) || mon;
        await animatedBuff(mon, target, sk);
      } else {
        let target = battle().enemies?.[cmd.targetIndex];
        if (!target || target.currentHp <= 0) target = firstAliveEnemy();
        if (target) await animatedDamage(mon, target, sk.power || 1, sk.name, sk, { attackerSide: 'ally', targetSide: 'enemy' });
      }
      return;
    }
    let target = battle().enemies?.[cmd.targetIndex];
    if (!target || target.currentHp <= 0) target = firstAliveEnemy();
    if (target) await animatedDamage(mon, target, 1.0, '攻撃', null, { attackerSide: 'ally', targetSide: 'enemy' });
  }

  async function executeEnemyAction(enemy){
    if (!enemy || enemy.currentHp <= 0 || !aliveParty().length) return;
    const targets = aliveParty();
    const target = randomPick(targets);
    if (!target) return;
    const usable = (enemy.skills || []).map(id => skillMap()[id]).filter(sk => sk && sk.mp <= enemy.currentMp && sk.type !== 'heal' && sk.type !== 'buff');
    const skill = usable.length ? randomPick(usable) : null;
    if (skill) {
      enemy.currentMp -= skill.mp;
      saveState();
      window.renderBattle();
      await animatedDamage(enemy, target, (skill.power || 1) * 0.88, skill.name, skill, { attackerSide: 'enemy', targetSide: 'ally' });
    } else {
      await animatedDamage(enemy, target, 0.82, '攻撃', null, { attackerSide: 'enemy', targetSide: 'ally' });
    }
  }

  async function resolveFullTurn(){
    if (V193.resolving || !battle() || battle().status !== 'battle') return;
    const q = battle().commandQueue || {};
    const hasOrders = Object.keys(q).length > 0;
    if (hasOrders && !isAllOrdersReady()) {
      const left = alivePartyIds().filter(id => !q[id]).length;
      if (typeof window.showToast === 'function') window.showToast(`まだ${left}体の命令が未設定です`);
      ui.battleMenu = 'orderAlly';
      window.renderBattle();
      return;
    }

    setBusy(true);
    try {
      ui.battleMenu = 'main';
      window.renderBattle();
      const commands = hasOrders ? q : Object.fromEntries(aliveParty().map(mon => [mon.uid, chooseAutoCommand(mon)]));
      for (const mon of aliveParty()) {
        if (!battle() || battle().status !== 'battle') break;
        if (!activeEnemies().length) break;
        await executePartyCommand(mon, commands[mon.uid]);
        if (await finishBattleIfNeeded()) { clearOrders(); return; }
      }
      if (battle()?.status !== 'battle') { clearOrders(); return; }
      const enemyList = activeEnemies().slice();
      for (const enemy of enemyList) {
        if (enemy.currentHp <= 0) continue;
        await executeEnemyAction(enemy);
        if (await finishBattleIfNeeded()) { clearOrders(); return; }
      }
      ui.battleTurn = (ui.battleTurn || 1) + 1;
      clearOrders();
      saveState();
      window.renderBattle();
    } finally {
      setBusy(false);
    }
  }

  window.playerAttack = resolveFullTurn;

  setTimeout(() => { clearTransientFx(); syncBattleNote(); }, 0);

  window.MonsterRpgV193 = {
    version: '1.9.3',
    resolveFullTurn
  };
})();
</script>


<script id="v194-battle-ui-fix-script">
(function(){
  "use strict";

  const state = window.state;
  const ui = window.ui;

  function battle(){ return state?.battle; }
  function party(){ return typeof window.party === 'function' ? window.party() : []; }
  function aliveParty(){ return typeof window.aliveParty === 'function' ? window.aliveParty() : party().filter(m => m.currentHp > 0); }
  function skillMap(){ return window.skills || {}; }
  function escapeHtml(str){
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function compactLog(text){
    let t = String(text || '');
    t = t.replace(/パーティ全員の命令がそろった！「戦う」で行動開始。?/g, '全員の命令完了。「戦う」で開始');
    t = t.replace(/残り(\d+)体の命令を選んでください。?/g, '残り$1体に命令してください');
    t = t.replace(/(.+?)に「(.+?)」を命令した。?/g, '$1 → $2');
    t = t.replace(/通常攻撃/g, '攻撃');
    return t;
  }

  function syncNote(){
    const note = document.querySelector('#battleView .v14-battle-note');
    if (!note) return;
    const latest = battle()?.log?.length ? battle().log[battle().log.length - 1] : '';
    note.textContent = compactLog(latest || 'コマンド選択');
  }

  const prevAddLog = window.addLog;
  window.addLog = function(text){
    const finalText = compactLog(text);
    if (battle()) battle().log = [finalText];
    syncNote();
    return finalText;
  };

  function removeOldEffects(){
    document.querySelectorAll('#battleView .v14-effect-label').forEach(el => el.remove());
    document.querySelectorAll('#battleView .v191-target-overlay').forEach(el => el.remove());
    const banners = document.querySelectorAll('#battleView .v18-order-banner');
    banners.forEach(el => el.remove());
  }

  function ensureOverlay(layout){
    let svg = layout.querySelector('.v194-target-overlay');
    const w = Math.max(1, Math.round(layout.clientWidth));
    const h = Math.max(1, Math.round(layout.clientHeight));
    if (!svg) {
      svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'v194-target-overlay');
      svg.innerHTML = '<defs>' +
        '<marker id="v194-arrow-attack" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#ffd56b"></path></marker>' +
        '<marker id="v194-arrow-heal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#72efad"></path></marker>' +
        '<marker id="v194-arrow-buff" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#76c7ff"></path></marker>' +
      '</defs>';
      layout.appendChild(svg);
    }
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    while (svg.childNodes.length > 1) svg.removeChild(svg.lastChild);
    return svg;
  }

  function point(rect, xPct, yPct, base){
    return {
      x: rect.left - base.left + rect.width * xPct,
      y: rect.top - base.top + rect.height * yPct
    };
  }

  function drawPath(svg, d, kind, labelPos, label){
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', `arrow-path ${kind}`);
    path.setAttribute('marker-end', `url(#v194-arrow-${kind})`);
    svg.appendChild(path);
    if (label && labelPos) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', String(labelPos.x));
      text.setAttribute('y', String(labelPos.y));
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('class', 'arrow-label');
      text.textContent = label;
      svg.appendChild(text);
    }
  }

  function renderTargetArrows(){
    if (!battle() || ui?.view !== 'battle') return;
    const layout = document.querySelector('#battleView .battle-layout');
    if (!layout) return;
    const allyCards = Array.from(document.querySelectorAll('#battleView .ally-row .ally-card'));
    const enemySlots = Array.from(document.querySelectorAll('#battleView .enemy-sprite-row .enemy-slot'));
    const svg = ensureOverlay(layout);
    const commands = battle().commandQueue || {};
    const entries = Object.entries(commands);
    if (!entries.length) return;

    const layoutRect = layout.getBoundingClientRect();
    const partyList = party();
    const allyIndexByUid = new Map(partyList.map((m, idx) => [m.uid, idx]));

    entries.forEach(([uid, cmd]) => {
      const sourceIndex = allyIndexByUid.get(uid);
      const sourceEl = sourceIndex != null ? allyCards[sourceIndex] : null;
      if (!sourceEl || !cmd) return;

      let targetEl = null;
      let kind = 'attack';
      let label = '攻撃';

      if (cmd.type === 'attack') {
        targetEl = enemySlots[cmd.targetIndex] || enemySlots.find(el => !el.classList.contains('defeated') && !el.classList.contains('v14-defeated'));
      } else if (cmd.type === 'skill') {
        const sk = skillMap()[cmd.skillId];
        label = sk?.name || '特技';
        if (sk?.type === 'heal') {
          kind = 'heal';
          const targetIndex = partyList.findIndex(m => m.uid === cmd.targetUid);
          targetEl = targetIndex >= 0 ? allyCards[targetIndex] : sourceEl;
        } else if (sk?.type === 'buff') {
          kind = 'buff';
          const targetIndex = partyList.findIndex(m => m.uid === (cmd.targetUid || uid));
          targetEl = targetIndex >= 0 ? allyCards[targetIndex] : sourceEl;
        } else {
          kind = 'attack';
          targetEl = enemySlots[cmd.targetIndex] || enemySlots.find(el => !el.classList.contains('defeated') && !el.classList.contains('v14-defeated'));
        }
      }
      if (!targetEl) return;

      const sourceRect = sourceEl.getBoundingClientRect();
      const targetRect = targetEl.getBoundingClientRect();
      const start = point(sourceRect, 0.5, 0.02, layoutRect);
      const end = targetEl.classList.contains('ally-card')
        ? point(targetRect, 0.5, 0.18, layoutRect)
        : point(targetRect, 0.5, 0.78, layoutRect);
      const verticalLift = targetEl.classList.contains('ally-card') ? -26 : -58;
      const midY = Math.min(start.y, end.y) + verticalLift;
      const c1 = { x: start.x, y: midY };
      const c2 = { x: end.x, y: midY };
      const d = `M ${start.x} ${start.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${end.x} ${end.y}`;
      const labelPos = { x: (start.x + end.x) / 2, y: midY - 6 };
      drawPath(svg, d, kind, labelPos, label.length <= 6 ? label : '');
    });
  }

  function cleanupOrderBox(){
    document.querySelectorAll('#battleView .v18-order-banner').forEach(el => el.remove());
  }

  function decorateBattle(){
    removeOldEffects();
    cleanupOrderBox();
    renderTargetArrows();
    syncNote();
  }

  const prevRenderBattle = window.renderBattle;
  window.renderBattle = function(){
    const result = prevRenderBattle ? prevRenderBattle.apply(this, arguments) : undefined;
    requestAnimationFrame(decorateBattle);
    return result;
  };

  const battleView = document.getElementById('battleView');
  if (battleView) {
    const observer = new MutationObserver(() => requestAnimationFrame(decorateBattle));
    observer.observe(battleView, { childList: true, subtree: true });
  }
  window.addEventListener('resize', () => requestAnimationFrame(decorateBattle));
  setTimeout(decorateBattle, 0);

  window.MonsterRpgV194 = {
    version: '1.9.4',
    decorateBattle
  };
})();
</script>


<script id="v195-battle-tempo-1500-script">
(function(){
  "use strict";

  function unlockCommandSelectIfIdle(){
    const view = document.getElementById("battleView");
    const battle = window.state && window.state.battle;
    if (!view || !battle || battle.status !== "battle") return;

    // 行動演出中のロックは維持。選択画面に戻った後だけロック残りを外す。
    const hasActionFx =
      document.querySelector("#battleView .v14-damage-pop") ||
      document.querySelector("#battleView .v14-hit-flash");

    if (!hasActionFx) {
      view.classList.remove("v14-command-lock");
    }
  }

  const immediateFns = [
    "openBattleMenu",
    "backBattleMenu",
    "selectOrderAlly",
    "selectOrderSkill",
    "selectOrderTarget",
    "selectOrderAllyTarget",
    "selectTacticAlly",
    "setTacticPolicy",
    "selectScoutTarget"
  ];

  for (const name of immediateFns) {
    const fn = window[name];
    if (typeof fn !== "function" || fn.__v195Immediate) continue;

    const wrapped = function(){
      const result = fn.apply(this, arguments);
      requestAnimationFrame(unlockCommandSelectIfIdle);
      return result;
    };

    wrapped.__v195Immediate = true;
    window[name] = wrapped;
  }

  window.MonsterRpgV195 = {
    version: "1.9.5",
    normalActionMs: 1500,
    fastActionMs: 750
  };
})();
</script>


<script id="v196-debug-play-fixes-script">
(function(){
  "use strict";

  const V196 = { busy: false };

  const st = () => window.state || window.v18ctx?.state;
  const ui = () => window.ui || window.v18ctx?.ui;
  const b = () => st()?.battle || null;
  const skills = () => window.skills || window.v18ctx?.skills || {};
  const species = () => window.species || window.v18ctx?.species || {};
  const ranks = () => window.rankValue || window.v18ctx?.rankValue || { F:1, E:2, D:3, C:4, B:5, A:6, S:7 };
  const party = () => (typeof window.party === 'function' ? window.party() : window.v18ctx?.party?.()) || [];
  const aliveParty = () => (typeof window.aliveParty === 'function' ? window.aliveParty() : party().filter(m => m.currentHp > 0));
  const maxStats = mon => (typeof window.maxStats === 'function' ? window.maxStats(mon) : window.v18ctx?.maxStats?.(mon)) || { hp: Math.max(mon?.currentHp || 1, 1), mp: mon?.currentMp || 0, atk: 10, def: 8, wis: 8 };
  const getOwned = uid => (typeof window.getOwned === 'function' ? window.getOwned(uid) : window.v18ctx?.getOwned?.(uid));
  const save = () => { try { (window.saveState || window.v18ctx?.saveState)?.(); } catch(e){} };
  const renderBattle = () => { try { (window.renderBattle || window.v18ctx?.renderBattle)?.(); } catch(e){} };

  function wait(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
  function actionMs(){ return ui()?.battleSpeed === '高速' ? 750 : 1500; }
  function activeEnemies(){ return (b()?.enemies || []).filter(e => e.currentHp > 0); }
  function firstEnemy(){ return activeEnemies()[0] || null; }
  function randomPick(arr){ return arr[Math.floor(Math.random() * arr.length)] || null; }
  function allyIndex(mon){ return party().findIndex(m => m.uid === mon?.uid); }
  function enemyIndex(enemy){ return b()?.enemies?.indexOf(enemy) ?? 0; }

  function compact(text){
    return String(text || '')
      .replace(/パーティ全員の命令がそろった！「戦う」で行動開始。?/g, '全員の命令完了。「戦う」で開始')
      .replace(/残り(\d+)体の命令を選んでください。?/g, '残り$1体に命令してください')
      .replace(/(.+?)に「(.+?)」を命令した。?/g, '$1 → $2')
      .replace(/通常攻撃/g, '攻撃');
  }

  function setLog(text){
    const battle = b();
    if (!battle) return;
    battle.log = [compact(text)];
    syncNote();
  }
  window.addLog = setLog;

  function syncNote(){
    const note = document.querySelector('#battleView .v14-battle-note');
    if (!note) return;
    const logs = b()?.log || [];
    note.textContent = compact(logs[logs.length - 1] || 'コマンド選択');
  }

  function clearFx(){
    document.querySelectorAll('#battleView .v14-effect-label').forEach(el => el.remove());
    if (!V196.busy) document.querySelectorAll('#battleView .v14-damage-pop, #battleView .v14-hit-flash').forEach(el => el.remove());
  }

  function setBusy(flag){
    V196.busy = Boolean(flag);
    const view = document.getElementById('battleView');
    if (view) {
      view.classList.toggle('v14-command-lock', V196.busy);
      view.classList.toggle('v196-busy', V196.busy);
    }
  }

  function calcDamage(attacker, defender, multiplier, skill){
    const a = maxStats(attacker);
    const d = maxStats(defender);
    const magic = skill && ['magic','fire','water','storm'].includes(skill.type);
    const atk = magic ? a.wis * 1.25 : a.atk;
    const variance = 0.9 + Math.random() * 0.2;
    return Math.max(3, Math.floor((atk * (multiplier || 1) - (d.def + (defender.tempDef || 0)) * 0.45 + (attacker.level || 1) * 2) * variance));
  }

  function pop(text, side, kind, index){
    const arena = document.querySelector('#battleView .arena') || document.querySelector('#battleView');
    if (!arena) return;
    const el = document.createElement('div');
    el.className = 'v14-damage-pop ' + (kind || 'damage');
    el.textContent = text;
    if (side === 'ally') {
      el.style.left = (24 + Math.min(index, 2) * 30) + '%';
      el.style.top = '70%';
    } else {
      el.style.left = (24 + Math.min(index, 2) * 26) + '%';
      el.style.top = '38%';
    }
    arena.appendChild(el);
  }

  function flash(side, index){
    const arena = document.querySelector('#battleView .arena') || document.querySelector('#battleView');
    if (!arena) return;
    const el = document.createElement('div');
    el.className = 'v14-hit-flash';
    if (side === 'ally') {
      el.style.left = (18 + Math.min(index, 2) * 31) + '%';
      el.style.top = '66%';
    } else {
      el.style.left = (18 + Math.min(index, 2) * 28) + '%';
      el.style.top = '32%';
    }
    arena.appendChild(el);
  }

  function lunge(side, index){
    const target = side === 'enemy'
      ? document.querySelectorAll('#battleView .enemy-slot .sprite')[index]
      : document.querySelectorAll('#battleView .ally-card')[index];
    if (!target) return;
    target.classList.remove('v14-attacker-lunge');
    void target.offsetWidth;
    target.classList.add('v14-attacker-lunge');
    setTimeout(() => target.classList.remove('v14-attacker-lunge'), 350);
  }

  function lowHpAlly(){
    return aliveParty().slice().sort((a, c) => (a.currentHp / Math.max(1, maxStats(a).hp)) - (c.currentHp / Math.max(1, maxStats(c).hp)))[0] || null;
  }

  function chooseAuto(mon){
    const usable = (mon.skills || []).map(id => skills()[id]).filter(sk => sk && sk.mp <= mon.currentMp);
    const policy = mon.aiPolicy || 'バランス重視';
    const enemy = firstEnemy();
    if (!enemy) return null;
    const enemyIdx = enemyIndex(enemy);
    if (policy === '特技を使うな') return { type:'attack', targetIndex: enemyIdx };
    const heal = usable.find(sk => sk.type === 'heal');
    const low = lowHpAlly();
    if (heal && low && low.currentHp / Math.max(1, maxStats(low).hp) < (policy === 'いのち大事に' ? 0.75 : 0.45)) return { type:'skill', skillId: heal.id, targetUid: low.uid };
    if (policy === 'MP節約' && Math.random() < 0.72) return { type:'attack', targetIndex: enemyIdx };
    const attacks = usable.filter(sk => !['heal','buff'].includes(sk.type));
    if (attacks.length && Math.random() < (policy === 'ガンガン攻める' ? 0.82 : 0.48)) return { type:'skill', skillId: attacks[0].id, targetIndex: enemyIdx };
    const buff = usable.find(sk => sk.type === 'buff');
    if (buff && policy === '回復・支援優先' && Math.random() < 0.35) return { type:'skill', skillId: buff.id, targetUid: mon.uid };
    return { type:'attack', targetIndex: enemyIdx };
  }

  function ordersReady(){
    const q = b()?.commandQueue || {};
    const ids = aliveParty().map(m => m.uid);
    return ids.length > 0 && ids.every(id => Boolean(q[id]));
  }

  function clearOrders(){
    const battle = b();
    if (!battle) return;
    battle.commandQueue = {};
    const u = ui();
    if (u) { u.selectedAllyId = null; u.selectedSkillId = null; u.battleMenu = 'main'; }
  }

  async function actionDamage(attacker, defender, multiplier, label, skill, attackerSide, targetSide){
    if (!attacker || !defender || defender.currentHp <= 0) return;
    lunge(attackerSide, attackerSide === 'enemy' ? enemyIndex(attacker) : allyIndex(attacker));
    await wait(actionMs() * 0.25);
    const dmg = calcDamage(attacker, defender, multiplier, skill);
    defender.currentHp = Math.max(0, defender.currentHp - dmg);
    const targetIdx = targetSide === 'enemy' ? enemyIndex(defender) : allyIndex(defender);
    flash(targetSide, Math.max(0, targetIdx));
    pop(String(dmg), targetSide, 'damage', Math.max(0, targetIdx));
    setLog(defender.currentHp <= 0 ? `${attacker.nickname}の${label}！ ${defender.nickname}を倒した！` : `${attacker.nickname}の${label}！ ${defender.nickname}に${dmg}ダメージ`);
    save();
    renderBattle();
    await wait(actionMs() * 0.75);
  }

  async function actionHeal(caster, target, skill){
    if (!caster || !target || !skill) return;
    lunge('ally', Math.max(0, allyIndex(caster)));
    await wait(actionMs() * 0.25);
    const amount = Math.max(12, Math.floor(maxStats(caster).wis * Math.abs(skill.power || 1)));
    target.currentHp = Math.min(maxStats(target).hp, target.currentHp + amount);
    pop('+' + amount, 'ally', 'heal', Math.max(0, allyIndex(target)));
    setLog(`${caster.nickname}の${skill.name}！ ${target.nickname}を${amount}回復`);
    save();
    renderBattle();
    await wait(actionMs() * 0.75);
  }

  async function actionBuff(caster, target, skill){
    lunge('ally', Math.max(0, allyIndex(caster)));
    await wait(actionMs() * 0.25);
    target.tempDef = (target.tempDef || 0) + 5;

    const heal = usable.find(sk=>sk.type==='heal'); const low = lowAlly();
