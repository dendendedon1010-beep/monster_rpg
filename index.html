    if(policy==='特技を使うな' || (policy==='MP節約' && Math.random()<0.72)) return {type:'attack', targetIndex:enemyList().indexOf(target)};
    const attacks = usable.filter(sk=>!['heal','buff'].includes(sk.type));
    if(attacks.length && Math.random() < (policy==='ガンガン攻める'?0.82:0.48)) return {type:'skill', skillId:attacks[0].id, targetIndex:enemyList().indexOf(target)};
    return {type:'attack', targetIndex:enemyList().indexOf(target)};
  }
  async function hit(attacker, defender, mult, label, sk, attackerSide, targetSide){
    if(!attacker || !defender || defender.currentHp<=0) return;
    lunge(attackerSide, attackerSide==='enemy'?idx(attacker,enemyList()):idx(attacker,partyList()));
    await sleep(tempo()*0.22);
    const amount = dmg(attacker, defender, mult, sk);
    defender.currentHp = Math.max(0, defender.currentHp - amount);
    const ti = targetSide==='enemy'?idx(defender,enemyList()):idx(defender,partyList());
    flash(targetSide, ti); pop(String(amount), targetSide, 'damage', ti);
    setLog(defender.currentHp<=0 ? `${attacker.nickname}の${label}！ ${defender.nickname}を倒した！` : `${attacker.nickname}の${label}！ ${defender.nickname}に${amount}ダメージ`);
    save(); renderB(); await sleep(tempo()*0.78);
  }
  async function heal(caster, target, sk){
    lunge('ally', idx(caster,partyList())); await sleep(tempo()*0.22);
    const amount = Math.max(12, Math.floor(maxS(caster).wis*Math.abs(sk.power||1)));
    target.currentHp = Math.min(maxS(target).hp, target.currentHp + amount);
    pop('+'+amount, 'ally', 'heal', idx(target,partyList()));
    setLog(`${caster.nickname}の${sk.name}！ ${target.nickname}を${amount}回復`);
    save(); renderB(); await sleep(tempo()*0.78);
  }
  async function buff(caster, target, sk){
    lunge('ally', idx(caster,partyList())); await sleep(tempo()*0.22);
    target.tempDef = (target.tempDef||0)+5; pop('UP','ally','buff',idx(target,partyList()));
    setLog(`${caster.nickname}の${sk.name}！ ${target.nickname}を強化`);
    save(); renderB(); await sleep(tempo()*0.78);
  }
  async function allyAct(mon, cmd){
    if(!mon || mon.currentHp<=0) return;
    cmd = cmd || chooseAuto(mon); if(!cmd) return;
    if(cmd.type==='skill'){
      const sk = skills()[cmd.skillId];
      if(!sk || mon.currentMp < sk.mp){ const t=aliveEnemies()[0]; if(t) await hit(mon,t,1,'攻撃',null,'ally','enemy'); return; }
      mon.currentMp -= sk.mp; save(); renderB();
      if(sk.type==='heal') await heal(mon, getMon(cmd.targetUid)||lowAlly()||mon, sk);
      else if(sk.type==='buff') await buff(mon, getMon(cmd.targetUid)||mon, sk);
      else { let t=enemyList()[cmd.targetIndex]; if(!t||t.currentHp<=0)t=aliveEnemies()[0]; if(t) await hit(mon,t,sk.power||1,sk.name,sk,'ally','enemy'); }
    } else { let t=enemyList()[cmd.targetIndex]; if(!t||t.currentHp<=0)t=aliveEnemies()[0]; if(t) await hit(mon,t,1,'攻撃',null,'ally','enemy'); }
  }
  async function enemyAct(enemy){
    if(!enemy || enemy.currentHp<=0) return;
    const target = random(aliveAllies()); if(!target) return;
    const usable = (enemy.skills||[]).map(id=>skills()[id]).filter(sk=>sk && sk.mp<=enemy.currentMp && sk.type!=='heal' && sk.type!=='buff');
    const sk = random(usable);
    if(sk){ enemy.currentMp -= sk.mp; save(); renderB(); await hit(enemy,target,(sk.power||1)*0.88,sk.name,sk,'enemy','ally'); }
    else await hit(enemy,target,0.82,'攻撃',null,'enemy','ally');
  }
  function expSnap(){ return partyList().map(m=>({uid:m.uid,name:m.nickname,level:m.level,exp:m.exp,next:(typeof expToNext==='function'?expToNext(m.level):100)})); }
  function rewards(){ return enemyList().reduce((a,e)=>{ const sp=speciesMap()[e.speciesId]||{rank:'F'}; const rv=rankMap()[sp.rank]||1; a.exp+=12+e.level*5+rv*4; a.gold+=8+e.level*3; return a; },{exp:0,gold:0}); }
  function endCheck(){
    const battle=bt(); if(!battle) return true;
    if(!aliveAllies().length){ battle.status='lose'; setLog('味方が全滅した……'); save(); renderB(); window.MonsterRpgV14?.showResultOverlay?.({type:'lose',exp:0,gold:0,item:null,partyExp:{before:expSnap(),after:expSnap()},finalFloor:false}); return true; }
    if(!aliveEnemies().length){ const r=rewards(); battle.reward=battle.reward||{exp:0,gold:0}; battle.reward.exp+=r.exp; battle.reward.gold+=r.gold; const before=expSnap(); if(typeof gainExp==='function') gainExp(r.exp); const after=expSnap(); const finalFloor=battle.floor>=battle.maxFloor; battle.status=finalFloor?'dungeonClear':'floorClear'; setLog(`勝利！ EXP${r.exp} / ${r.gold}G`); save(); renderB(); window.MonsterRpgV14?.showResultOverlay?.({type:'win',exp:r.exp,gold:r.gold,item:null,partyExp:{before,after},finalFloor}); return true; }
    return false;
  }
  async function fightAll(){
    const battle = bt(); if(window.__v198Busy || !battle || battle.status!=='battle') return;
    const q = battle.commandQueue || {}; const hasOrders = Object.keys(q).length>0;
    if(hasOrders && !aliveAllies().every(m=>q[m.uid])){ const left=aliveAllies().filter(m=>!q[m.uid]).length; setLog(`残り${left}体に命令してください`); const u=gu(); if(u)u.battleMenu='orderAlly'; renderB(); return; }
    window.__v198Busy=true; setBusy(true);
    try{
      const u=gu(); if(u)u.battleMenu='main'; renderB();
      const commands=hasOrders?{...q}:Object.fromEntries(aliveAllies().map(m=>[m.uid,chooseAuto(m)]));
      for(const mon of aliveAllies().slice()){ if(!bt()||bt().status!=='battle'||!aliveEnemies().length)break; await allyAct(mon,commands[mon.uid]); if(endCheck())return; }
      for(const en of aliveEnemies().slice()){ if(!bt()||bt().status!=='battle')break; await enemyAct(en); if(endCheck())return; }
      const u2=gu(); if(u2)u2.battleTurn=(u2.battleTurn||1)+1; battle.commandQueue={}; if(u2)u2.battleMenu='main'; save(); renderB();
    } finally { window.__v198Busy=false; setBusy(false); }
  }
  window.playerAttack = fightAll;
  document.addEventListener('click', function(ev){ const btn=ev.target?.closest?.('#battleView button.command-btn'); if(!btn||btn.textContent.trim()!=='戦う')return; ev.preventDefault(); ev.stopImmediatePropagation(); fightAll(); }, true);
  const prev=window.renderBattle; if(typeof prev==='function'){ window.renderBattle=function(){ const r=prev.apply(this,arguments); requestAnimationFrame(()=>{ clearFx(); const logs=bt()?.log||[]; const note=document.querySelector('#battleView .v14-battle-note'); if(note&&logs.length)note.textContent=logs[logs.length-1]; }); return r; }; }
  setTimeout(()=>{ clearFx(); },0);
  window.MonsterRpgV198={version:'1.9.8',fightAll};
})();
</script>


<script id="v199-fight-click-fix-script">
(function(){
  "use strict";
  function patchFightButton(){
    const buttons = Array.from(document.querySelectorAll('#battleView button.command-btn'));
    const fight = buttons.find(btn => btn.textContent.trim() === '戦う');
    if (!fight) return;
    // Earlier debug patches attached document-capture handlers to `.command-btn` and stopped propagation.
    // Remove only this class from the fight button so the inline/global playerAttack handler can run normally.
    fight.classList.remove('command-btn');
    fight.classList.add('v199-fight-btn');
    fight.onclick = function(event){
      event?.preventDefault?.();
      if (typeof window.playerAttack === 'function') window.playerAttack();
    };
  }
  const prev = window.renderBattle;
  if (typeof prev === 'function') {
    window.renderBattle = function(){
      const r = prev.apply(this, arguments);
      requestAnimationFrame(patchFightButton);
      return r;
    };
  }
  const battleView = document.getElementById('battleView');
  if (battleView) new MutationObserver(() => requestAnimationFrame(patchFightButton)).observe(battleView, {childList:true, subtree:true});
  setTimeout(patchFightButton, 0);
  window.MonsterRpgV199 = { version:'1.9.9', patchFightButton };
})();
</script>


<script id="v200-scout-state-fix-script">
(function(){
  "use strict";
  function gs(){ try{return state;}catch(e){return window.state;} }
  function gu(){ try{return ui;}catch(e){return window.ui;} }
  function bt(){ return gs()?.battle || null; }
  function sp(){ try{return species;}catch(e){return window.species||{};} }
  function ranks(){ try{return rankValue;}catch(e){return window.rankValue||{F:1,E:2,D:3,C:4,B:5,A:6,S:7};} }
  function maxS(m){ try{return maxStats(m);}catch(e){return {hp:m.currentHp||1,atk:10,wis:8};} }
  function pty(){ try{return party();}catch(e){return [];} }
  function save(){ try{saveState();}catch(e){} }
  function renderB(){ try{renderBattle();}catch(e){} }
  function render(){ try{window.render?.();}catch(e){} }
  function uniq(a){ try{return unique(a);}catch(e){return [...new Set(a)];} }
  function makeMonster(id,lvl){ try{return createMonster(id,lvl);}catch(e){return null;} }
  function log(t){ const b=bt(); if(b)b.log=[String(t)]; const note=document.querySelector('#battleView .v14-battle-note'); if(note)note.textContent=String(t); }
  function scoutRate(enemy){
    const max=maxS(enemy); const hpRate=enemy.currentHp/Math.max(1,max.hp); const rv=ranks()[sp()[enemy.speciesId]?.rank]||1;
    const atkWis=pty().reduce((s,m)=>s+(maxS(m).atk+maxS(m).wis)/2,0)/Math.max(1,pty().length);
    return Math.max(8, Math.min(92, Math.round(35+(1-hpRate)*35-rv*4+atkWis*0.45+(bt().scoutBoost||0))));
  }
  function reward(enemy){ const rv=ranks()[sp()[enemy.speciesId]?.rank]||1; return {exp:12+enemy.level*5+rv*4,gold:8+enemy.level*3}; }
  function expSnap(){ return pty().map(m=>({uid:m.uid,name:m.nickname,level:m.level,exp:m.exp,next:(typeof expToNext==='function'?expToNext(m.level):100)})); }
  window.openBattleMenu = function(name){
    const b=bt(); const u=gu(); if(!u)return;
    if(name==='orderAlly' && b) b.commandQueue={};
    if(name==='scoutTarget' && b?.scoutAttempted){ log('この戦闘でスカウトできるのは1体だけです'); u.battleMenu='main'; renderB(); return; }
    u.battleMenu=name; renderB();
  };
  window.backBattleMenu=function(){ const u=gu(); if(u)u.battleMenu='main'; renderB(); };
  window.selectScoutTarget=function(index){
    const b=bt(); const u=gu(); if(!b||!u||b.status!=='battle')return;
    const enemy=b.enemies[index]; if(!enemy||enemy.currentHp<=0)return;
    if(b.scoutAttempted){ log('この戦闘でスカウトできるのは1体だけです'); u.battleMenu='main'; renderB(); return; }
    b.scoutAttempted=true;
    const rate=scoutRate(enemy); log(`${enemy.nickname}へスカウト！ 成功率${rate}%`);
    if(Math.random()*100 < rate){
      const cand=makeMonster(enemy.speciesId, Math.max(1,enemy.level-1)); if(!cand)return;
      cand.nickname=sp()[enemy.speciesId]?.name || enemy.nickname;
      b.pendingScout={enemyIndex:index,candidate:cand,reward:reward(enemy),endBattleOnFinalize:true};
      enemy.currentHp=0; u.battleMenu='scoutName'; save(); renderB();
    } else {
      log(`${enemy.nickname}のスカウトに失敗した……`); u.battleMenu='main'; save(); renderB();
    }
  };
  window.finalizeScout=function(toParty){
    const s=gs(); const b=bt(); const u=gu(); const pending=b?.pendingScout; if(!s||!b||!pending)return;
    const input=document.getElementById('scoutNameInput'); const fallback=pending.candidate.nickname || sp()[pending.candidate.speciesId]?.name || '仲間';
    pending.candidate.nickname=(input?.value||fallback).trim().slice(0,8)||fallback;
    s.owned.push(pending.candidate); s.codex=uniq([...(s.codex||[]),pending.candidate.speciesId]);
    if(toParty && s.partyIds.length<3) s.partyIds.push(pending.candidate.uid);
    const r=pending.reward||reward(b.enemies[pending.enemyIndex]);
    b.reward=b.reward||{exp:0,gold:0}; b.reward.exp+=r.exp; b.reward.gold+=r.gold;
    const before=expSnap(); if(typeof gainExp==='function')gainExp(r.exp); const after=expSnap();
    const finalFloor=b.floor>=b.maxFloor; b.status=finalFloor?'dungeonClear':'floorClear'; b.pendingScout=null; if(u)u.battleMenu='main';
    log(`スカウト成功！ EXP${r.exp} / ${r.gold}G`); save(); renderB();
    window.MonsterRpgV14?.showResultOverlay?.({type:'win',exp:r.exp,gold:r.gold,item:'スカウト成功',partyExp:{before,after},finalFloor});
  };
  // Make the scout button avoid old stale capture handlers too.
  function patchScoutButton(){
    document.querySelectorAll('#battleView button.command-btn').forEach(btn=>{
      if(btn.textContent.trim()==='スカウト'){
        btn.onclick=function(ev){ev?.preventDefault?.(); window.openBattleMenu('scoutTarget');};
      }
    });
  }
  const prev=window.renderBattle; if(typeof prev==='function'){ window.renderBattle=function(){ const r=prev.apply(this,arguments); requestAnimationFrame(patchScoutButton); return r; }; }
  setTimeout(patchScoutButton,0);
  window.MonsterRpgV200={version:'2.0.0'};
})();
</script>


<script id="v201-order-state-fix-script">
(function(){
  "use strict";
  function gs(){ try{return state;}catch(e){return window.state;} }
  function gu(){ try{return ui;}catch(e){return window.ui;} }
  function bt(){ return gs()?.battle || null; }
  function pty(){ try{return party();}catch(e){return [];} }
  function alive(){ try{return aliveParty();}catch(e){return pty().filter(m=>m.currentHp>0);} }
  function getMon(uid){ try{return getOwned(uid);}catch(e){return null;} }
  function skillMap(){ try{return skills;}catch(e){return window.skills||{};} }
  function save(){ try{saveState();}catch(e){} }
  function renderB(){ try{renderBattle();}catch(e){} }
  function maxS(m){ try{return maxStats(m);}catch(e){return {hp:m.currentHp||1,mp:m.currentMp||0};} }
  function log(t){ const b=bt(); if(b)b.log=[String(t).replace(/通常攻撃/g,'攻撃')]; const note=document.querySelector('#battleView .v14-battle-note'); if(note)note.textContent=b?.log?.[0]||String(t); }
  function ids(){ return alive().map(m=>m.uid); }
  function commandLabel(cmd){ if(!cmd)return '未設定'; if(cmd.type==='attack')return '攻撃'; const sk=skillMap()[cmd.skillId]; return sk?.name || '特技'; }
  function ready(){ const q=bt()?.commandQueue||{}; const a=ids(); return a.length>0 && a.every(id=>q[id]); }
  function queue(uid, cmd){
    const b=bt(); const u=gu(); if(!b||!u)return;
    b.commandQueue=b.commandQueue||{}; b.commandQueue[uid]=cmd;
    const mon=getMon(uid); log(`${mon?.nickname||'仲間'} → ${commandLabel(cmd)}`);
    u.selectedAllyId=null; u.selectedSkillId=null;
    if(ready()){ u.battleMenu='main'; log('全員の命令完了。「戦う」で開始'); }
    else { u.battleMenu='orderAlly'; const left=ids().filter(id=>!b.commandQueue[id]).length; log(`残り${left}体に命令してください`); }
    save(); renderB();
  }
  window.selectOrderAlly=function(uid){
    const b=bt(); const u=gu(); if(!b||!u)return;
    if(b.commandQueue?.[uid]){ log('この仲間は命令済みです'); return; }
    u.selectedAllyId=uid; u.selectedSkillId=null; u.battleMenu='orderSkill'; renderB();
  };
  window.queueNormalAttackOrder=function(){
    const u=gu(); const b=bt(); if(!u||!b)return;
    const enemy=(b.enemies||[]).find(e=>e.currentHp>0); if(!enemy)return;
    queue(u.selectedAllyId,{type:'attack',targetIndex:b.enemies.indexOf(enemy)});
  };
  window.selectOrderSkill=function(skillId){
    const u=gu(); const mon=getMon(u?.selectedAllyId); const sk=skillMap()[skillId]; if(!u||!mon||!sk)return;
    if((mon.currentMp||0)<sk.mp){ log('MPが足りません'); return; }
    u.selectedSkillId=skillId;
    if(sk.type==='heal') u.battleMenu='orderAllyTarget';
    else if(sk.type==='buff') queue(mon.uid,{type:'skill',skillId,targetUid:mon.uid});
    else u.battleMenu='orderTarget';
    renderB();
  };
  window.selectOrderTarget=function(index){
    const u=gu(); const b=bt(); const mon=getMon(u?.selectedAllyId); const enemy=b?.enemies?.[index]; if(!u||!b||!mon||!enemy||enemy.currentHp<=0)return;
    queue(mon.uid,{type:'skill',skillId:u.selectedSkillId,targetIndex:index});
  };
  window.selectOrderAllyTarget=function(uid){
    const u=gu(); const mon=getMon(u?.selectedAllyId); const target=getMon(uid); if(!u||!mon||!target)return;
    queue(mon.uid,{type:'skill',skillId:u.selectedSkillId,targetUid:uid});
  };
  function patchOrderSkillButton(){
    const u=gu(); if(u?.battleMenu!=='orderSkill')return;
    const grid=document.querySelector('#battleView .battle-submenu .submenu-grid.one'); if(!grid||grid.querySelector('.v201-basic-attack'))return;
    const btn=document.createElement('button'); btn.className='submenu-btn v201-basic-attack'; btn.innerHTML='<b>通常攻撃</b><br><span class="tiny">MPを使わず攻撃</span>'; btn.onclick=window.queueNormalAttackOrder;
    grid.insertBefore(btn,grid.firstChild);
  }
  const prev=window.renderBattle; if(typeof prev==='function'){ window.renderBattle=function(){ const r=prev.apply(this,arguments); requestAnimationFrame(patchOrderSkillButton); return r; }; }
  setTimeout(patchOrderSkillButton,0);
  window.MonsterRpgV201={version:'2.0.1'};
})();
</script>
